<template>
    <div class="app-container">
        <!-- Refined Professional Sidebar -->
        <nav class="sidebar">
            <div class="sidebar-header">
                <img src={logoUrl} alt="Portwood DocGen" class="logo-icon" />
                <div class="logo-text">
                    <h2>DocGen</h2>
                    <p>Document Automation</p>
                </div>
            </div>

            <div class="nav-links">
                <button class={templatesTabClass} onclick={handleShowTemplates}>
                    <lightning-icon icon-name="utility:file" size="x-small" class="nav-icon"></lightning-icon>
                    <span>My Templates</span>
                </button>
                <button class={bulkTabClass} onclick={handleShowBulk}>
                    <lightning-icon icon-name="utility:layers" size="x-small" class="nav-icon"></lightning-icon>
                    <span>Bulk Generation</span>
                </button>
                <button class={signaturesTabClass} onclick={handleShowSignatures}>
                    <lightning-icon icon-name="utility:edit_form" size="x-small" class="nav-icon"></lightning-icon>
                    <span>Signatures</span>
                </button>
                <button class={assetsTabClass} onclick={handleShowAssets}>
                    <lightning-icon icon-name="utility:image" size="x-small" class="nav-icon"></lightning-icon>
                    <span>Assets</span>
                </button>
                <button class={buttonsTabClass} onclick={handleShowButtons}>
                    <lightning-icon icon-name="utility:button_choice" size="x-small" class="nav-icon"></lightning-icon>
                    <span>Buttons</span>
                </button>
                <button class={emailTabClass} onclick={handleShowEmail}>
                    <lightning-icon icon-name="utility:email" size="x-small" class="nav-icon"></lightning-icon>
                    <span>Email Templates</span>
                </button>
                <button class={helpTabClass} onclick={handleShowHelp}>
                    <lightning-icon icon-name="utility:knowledge_base" size="x-small" class="nav-icon"></lightning-icon>
                    <span>Learning Center</span>
                </button>
            </div>

            <div class="sidebar-footer">
                <a
                    href="mailto:support@portwood.dev?subject=DocGen%20bug%20report"
                    class="community-link"
                    title="Something broken or confusing? Tell us — it goes straight to the team."
                >
                    <lightning-icon icon-name="utility:bug" size="xx-small" class="nav-icon"></lightning-icon>
                    Report a Bug
                </a>
                <a
                    href="https://portwood.dev/services"
                    target="_blank"
                    class="community-link"
                    title="Need a template built, a rollout planned, or hands-on help? Our team does that."
                >
                    <lightning-icon icon-name="utility:touch_action" size="xx-small" class="nav-icon"></lightning-icon>
                    Get Expert Help
                </a>
                <a href="https://portwood.dev/community" target="_blank" class="community-link">
                    <lightning-icon icon-name="utility:comments" size="xx-small" class="nav-icon"></lightning-icon>
                    Join the Community
                </a>
                <div class="footer-note">Made with <span class="heart">&#10084;&#65039;</span> for you</div>
            </div>
        </nav>

        <!-- Main Workspace Area -->
        <main class="workspace">
            <!-- Dynamic Content Area -->
            <div class="content-panel">
                <template if:true={isLoaded}>
                    <!-- TEMPLATES -->
                    <template if:true={isTemplates}>
                        <div class="panel-header">
                            <h2>Template Library</h2>
                            <p>Manage your document designs and create new ones.</p>
                        </div>
                        <div class="panel-body">
                            <c-doc-gen-admin></c-doc-gen-admin>
                        </div>
                    </template>

                    <!-- BULK -->
                    <template if:true={isBulk}>
                        <div class="panel-header">
                            <h2>Bulk Generation</h2>
                            <p>Create documents for hundreds of records at the same time.</p>
                        </div>
                        <div class="panel-body">
                            <c-doc-gen-bulk-runner></c-doc-gen-bulk-runner>
                        </div>
                    </template>

                    <!-- SIGNATURES -->
                    <template if:true={isSignatures}>
                        <div class="panel-header">
                            <h2>Signature Settings</h2>
                            <p>Configure email branding, site URL, and signature behavior.</p>
                        </div>
                        <div class="panel-body">
                            <c-doc-gen-signature-settings></c-doc-gen-signature-settings>
                        </div>
                    </template>

                    <!-- ASSETS -->
                    <template if:true={isAssets}>
                        <div class="panel-header">
                            <h2>Shared Assets</h2>
                            <p>Manage reusable images like logos and footers that update everywhere at once.</p>
                        </div>
                        <div class="panel-body">
                            <c-doc-gen-assets></c-doc-gen-assets>
                        </div>
                    </template>

                    <!-- BUTTONS -->
                    <template if:true={isButtons}>
                        <div class="panel-header">
                            <h2>Document Buttons</h2>
                            <p>
                                Create one-click document buttons for record pages — choose the object, template, and
                                record types, no Setup needed.
                            </p>
                        </div>
                        <div class="panel-body">
                            <c-doc-gen-button-builder></c-doc-gen-button-builder>
                        </div>
                    </template>

                    <!-- EMAIL TEMPLATES -->
                    <template if:true={isEmail}>
                        <div class="panel-header">
                            <h2>Email Templates</h2>
                            <p>
                                Brand and edit every signature email — request, reminder, verification, and completion.
                            </p>
                        </div>
                        <div class="panel-body">
                            <c-doc-gen-email-templates></c-doc-gen-email-templates>
                        </div>
                    </template>

                    <!-- HELP / LEARNING CENTER — moved to portwood.dev/guide -->
                    <template if:true={isHelp}>
                        <div class="panel-header">
                            <h2>User Guide</h2>
                            <p>
                                The full DocGen User Guide lives on the web — always up to date with the latest release.
                            </p>
                        </div>
                        <div class="panel-body">
                            <div class="guide-redirect-card">
                                <h3>Open the DocGen User Guide</h3>
                                <p>
                                    Setup walkthroughs, merge-tag syntax, e-signature configuration, PDF features, Flow
                                    integration, troubleshooting — everything is on the portwood.dev guide site,
                                    formatted for fast skimming and search.
                                </p>
                                <a
                                    href="https://portwood.dev/guide"
                                    target="_blank"
                                    rel="noopener noreferrer"
                                    class="guide-redirect-button"
                                >
                                    Open the User Guide ↗
                                </a>
                                <p class="guide-redirect-fineprint">
                                    Need implementation help or training? Visit&nbsp;<a
                                        href="https://portwood.dev/support"
                                        target="_blank"
                                        rel="noopener noreferrer"
                                        >portwood.dev/support</a
                                    >.
                                </p>
                            </div>
                        </div>
                    </template>
                </template>
            </div>
        </main>
    </div>
</template>
