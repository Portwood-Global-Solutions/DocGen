                                                    <span>{pdfAcroFormPreparationText}</span>
                                                </div>
                                            </template>
                                            <div class="pdf-acroform-mapping__tools">
                                                <div class="pdf-acroform-mapping__search">
                                                    <lightning-input
                                                        type="search"
                                                        label="Search fillable fields"
                                                        variant="label-hidden"
                                                        value={pdfAcroFormSearchTerm}
                                                        placeholder="Search field, page, position, data path..."
                                                        onchange={handlePdfAcroFormSearchChange}
                                                    ></lightning-input>
                                                </div>
                                                <div class="pdf-acroform-mapping__filter">
                                                    <lightning-combobox
                                                        label="Filter fillable fields"
                                                        variant="label-hidden"
                                                        value={pdfAcroFormFilter}
                                                        options={pdfAcroFormFilterOptions}
                                                        onchange={handlePdfAcroFormFilterChange}
                                                    ></lightning-combobox>
                                                </div>
                                                <span class="slds-text-body_small slds-text-color_weak">
                                                    Showing {pdfAcroFormVisibleFieldCount} of {pdfAcroFormFieldCount}
                                                </span>
                                            </div>
                                            <div class="pdf-acroform-mapping__scroll">
                                                <table class="pdf-acroform-mapping__table">
                                                    <thead>
                                                        <tr>
                                                            <th scope="col">Label / Fillable Field</th>
                                                            <th scope="col">Type</th>
                                                            <th scope="col">Position</th>
                                                            <th scope="col">Data Path</th>
                                                            <th scope="col">Checked Value</th>
                                                        </tr>
                                                    </thead>
                                                    <tbody>
                                                        <template for:each={pdfAcroFormFieldRows} for:item="row">
                                                            <tr key={row.key} class={row.rowClass}>
                                                                <td>
                                                                    <lightning-input
                                                                        type="text"
                                                                        variant="label-hidden"
                                                                        value={row.friendlyLabel}
                                                                        data-index={row.index}
                                                                        placeholder="Add label"
                                                                        onchange={handlePdfAcroFormFriendlyLabelChange}
                                                                    ></lightning-input>
                                                                    <div class="pdf-acroform-field-name">
                                                                        {row.displayName}
                                                                    </div>
                                                                    <template if:true={row.partialName}>
                                                                        <div
                                                                            class="slds-text-body_small slds-text-color_weak"
                                                                        >
                                                                            {row.partialName}
                                                                        </div>
                                                                    </template>
                                                                </td>
                                                                <td>{row.fieldType}</td>
                                                                <td>
                                                                    <template if:true={row.pageLabel}>
                                                                        <div>{row.pageLabel}</div>
                                                                    </template>
                                                                    <template if:true={row.locationLabel}>
                                                                        <div
                                                                            class="slds-text-body_small slds-text-color_weak"
                                                                        >
                                                                            {row.locationLabel}
                                                                        </div>
                                                                    </template>
                                                                    <template if:true={row.positionText}>
                                                                        <div
                                                                            class="slds-text-body_small slds-text-color_weak"
                                                                        >
                                                                            {row.positionText}
                                                                        </div>
                                                                    </template>
                                                                </td>
                                                                <td>
                                                                    <template if:true={hasPdfAcroFormDataPathOptions}>
                                                                        <lightning-combobox
                                                                            variant="label-hidden"
                                                                            value={row.mappedPath}
                                                                            data-index={row.index}
                                                                            placeholder="Select query field"
                                                                            options={pdfAcroFormDataPathOptions}
                                                                            onchange={handlePdfAcroFormMappingChange}
                                                                        ></lightning-combobox>
                                                                    </template>
                                                                    <template if:false={hasPdfAcroFormDataPathOptions}>
                                                                        <lightning-input
                                                                            type="text"
                                                                            variant="label-hidden"
                                                                            value={row.mappedPath}
                                                                            data-index={row.index}
                                                                            placeholder="Add fields to the query first"
                                                                            onchange={handlePdfAcroFormMappingChange}
                                                                        ></lightning-input>
                                                                    </template>
                                                                </td>
                                                                <td>
                                                                    <template if:true={row.isButton}>
                                                                        <lightning-input
                                                                            type="text"
                                                                            variant="label-hidden"
                                                                            value={row.buttonOnValue}
                                                                            data-index={row.index}
                                                                            placeholder="Yes"
                                                                            onchange={handlePdfAcroFormButtonValueChange}
                                                                        ></lightning-input>
                                                                        <template if:true={row.buttonOnValuesText}>
                                                                            <div
                                                                                class="slds-text-body_small slds-text-color_weak"
                                                                            >
                                                                                {row.buttonOnValuesText}
                                                                            </div>
                                                                        </template>
                                                                    </template>
                                                                </td>
                                                            </tr>
                                                        </template>
                                                    </tbody>
                                                </table>
                                            </div>
                                        </div>
                                    </template>
                                    <template if:false={hasUploadedPdfAcroFormFields}>
                                        <div class="slds-box slds-theme_shade slds-text-align_center">
                                            <lightning-icon icon-name="utility:form" size="small"></lightning-icon>
                                            <h3 class="slds-text-heading_small slds-var-m-top_small">
                                                Fillable Field Mapping
                                            </h3>
                                            <p class="slds-text-body_small slds-text-color_weak slds-var-m-top_x-small">
                                                Upload a PDF template version or load the active snapshot to map fields.
                                            </p>
                                            <lightning-button
                                                class="slds-var-m-top_small"
                                                label="Load Active Mapping"
                                                icon-name="utility:refresh"
                                                onclick={handleReloadPdfAcroFormMapping}
                                            ></lightning-button>
                                        </div>
                                    </template>
                                </div>
                            </lightning-tab>
                        </template>

                        <!-- Tab 4: Document & History -->
                        <lightning-tab label="Document & History" value="document">
                            <div class="slds-var-p-around_small">
                                <!-- Current File Section -->
                                <div
                                    class="slds-box slds-var-m-bottom_large"
                                    style="border-radius: 8px; border: 1px solid #e5e7eb"
                                >
                                    <div
                                        class="slds-grid slds-grid_align-spread slds-grid_vertical-align-center slds-var-m-bottom_medium"
                                    >
                                        <div class="slds-media slds-media_center">
                                            <div class="slds-media__figure">
                                                <lightning-icon icon-name="doctype:word" size="medium"></lightning-icon>
                                            </div>
                                            <div class="slds-media__body">
                                                <h2 class="slds-text-heading_small slds-var-m-bottom_xx-small">
                                                    Current Template File
                                                </h2>
                                                <template if:true={currentFileId}>
                                                    <lightning-badge
                                                        label="Active"
                                                        class="slds-theme_success"
                                                    ></lightning-badge>
                                                    <template if:true={currentVersionLabel}>
                                                        <lightning-badge
                                                            label={currentVersionLabel}
                                                            class="slds-var-m-left_x-small"
                                                        ></lightning-badge>
                                                    </template>
                                                </template>
                                                <template if:false={currentFileId}>
                                                    <p class="slds-text-body_small slds-text-color_weak">
                                                        No file uploaded.
                                                    </p>
                                                </template>
                                            </div>
                                        </div>
                                        <div class="slds-no-flex">
                                            <template if:true={currentFileId}>
                                                <lightning-button
                                                    label="Download Current"
                                                    icon-name="utility:download"
                                                    onclick={downloadTemplate}
                                                ></lightning-button>
                                            </template>
                                        </div>
                                    </div>
                                    <div class="slds-box slds-theme_shade" style="border-radius: 6px">
                                        <template if:false={isEditTypeHtml}>
                                            <template if:true={showEditFileUpload}>
                                                <lightning-file-upload
                                                    label="Upload New Version"
                                                    name="fileUploaderEdit"
                                                    accept={acceptedFormats}
                                                    record-id={editTemplateId}
                                                    onuploadfinished={handleEditUploadFinished}
                                                >
                                                </lightning-file-upload>
                                            </template>
                                            <p
                                                class="slds-text-body_small slds-text-color_weak slds-var-m-top_xx-small"
                                            >
                                                Max file size: 10 MB. Larger templates? In Word, right-click any image →
                                                <em>Compress Pictures → Email (96 ppi)</em> — most 20 MB templates drop
                                                to under 2 MB with no visible quality loss.
                                            </p>

                                            <!-- DOCX→HTML transparency: show the exact HTML the PDF engine
                                                 renders from the Word file. Editing it is a one-way ramp to an
                                                 HTML template — the snapshot regenerates on every DOCX upload,
                                                 so in-place edits would be silently clobbered. -->
                                            <template if:true={showDocxConvertedHtmlSection}>
                                                <div class="slds-var-m-top_small">
                                                    <lightning-button
                                                        label={docxHtmlViewerToggleLabel}
                                                        icon-name="utility:preview"
                                                        onclick={toggleDocxHtmlViewer}
                                                    ></lightning-button>
                                                    <template if:true={showDocxHtmlViewer}>
                                                        <div class="slds-var-m-top_small">
                                                            <div class="dg-html-editor-statusbar">
                                                                <span class="dg-html-editor-status"
                                                                    >{docxViewerStatusText}</span
                                                                >
                                                                <lightning-button
                                                                    label="Format Code"
                                                                    icon-name="utility:magicwand"
                                                                    variant="base"
                                                                    data-target="docx"
                                                                    onclick={handleFormatHtml}
                                                                    title="Pretty-print the converted HTML — the converter emits it as one long line."
                                                                    class="slds-var-m-left_small"
                                                                ></lightning-button>
                                                                <lightning-button
                                                                    label={docxHtmlPreviewToggleLabel}
                                                                    icon-name="utility:preview"
                                                                    variant="base"
                                                                    data-target="docx"
                                                                    onclick={handleToggleHtmlPreview}
                                                                    title="Render the converted HTML inline. Merge tags show as-is."
                                                                    class="slds-var-m-left_small"
                                                                ></lightning-button>
                                                            </div>
                                                            <template if:true={isLoadingDocxHtml}>
                                                                <div class="slds-is-relative" style="height: 40px">
                                                                    <lightning-spinner
                                                                        alternative-text="Loading converted HTML"
                                                                        size="small"
                                                                    ></lightning-spinner>
                                                                </div>
                                                            </template>
                                                            <textarea
                                                                class={docxHtmlEditorClass}
                                                                spellcheck="false"
                                                                aria-label="Converted HTML (what the PDF engine renders)"
                                                                placeholder="No conversion snapshot yet — upload a Word file and Save as New Version, then reopen this viewer."
                                                            ></textarea>
                                                            <template if:true={showDocxHtmlPreview}>
                                                                <div
                                                                    class="dg-html-preview-frame dg-docx-preview"
                                                                    lwc:dom="manual"
                                                                    title="Rendered preview of the converted HTML"
                                                                ></div>
                                                            </template>
                                                            <div class="slds-var-m-top_x-small">
                                                                <lightning-button
                                                                    variant="brand"
                                                                    label="Switch to HTML Template"
                                                                    icon-name="utility:change_record_type"
                                                                    onclick={handleSwitchToHtmlTemplate}
                                                                    disabled={isSwitchingToHtml}
                                                                ></lightning-button>
                                                                <template if:true={isSwitchingToHtml}>
                                                                    <lightning-spinner
                                                                        alternative-text="Converting"
                                                                        size="small"
                                                                        class="slds-var-m-left_small"
                                                                    ></lightning-spinner>
                                                                </template>
                                                                <span
                                                                    class="slds-text-body_small slds-text-color_weak slds-var-m-left_small"
                                                                >
                                                                    Fine-tuned this HTML? Converting makes it the
                                                                    template's real body (Type becomes HTML) so your
                                                                    edits stick. Until then this view is regenerated
                                                                    from the Word file on every upload.
                                                                </span>
                                                            </div>
                                                        </div>
                                                    </template>
                                                </div>
                                            </template>
                                        </template>

                                        <template if:true={isEditTypeHtml}>
                                            <label class="slds-form-element__label">Upload New Version</label>
                                            <p class="slds-text-body_small slds-var-m-bottom_x-small">
                                                Accepts <code>.html</code>, <code>.htm</code>, or a Google Docs
                                                "Download → Web Page" <code>.zip</code>. Images are extracted and linked
                                                automatically.
                                            </p>
                                            <input
                                                type="file"
                                                class="docgen-html-file-input"
                                                accept=".html,.htm,.zip"
                                                onchange={handleHtmlFileSelected}
                                                style="display: none"
                                            />
                                            <lightning-button
                                                label="Choose File"
                                                icon-name="utility:upload"
                                                onclick={triggerHtmlFilePicker}
                                                disabled={isUploadingHtml}
                                            >
                                            </lightning-button>
                                            <lightning-button
                                                variant="brand"
                                                label="Open Designer"
                                                icon-name="utility:brush"
                                                onclick={handleOpenDesignerFromModal}
                                                title="Full-screen visual designer: edit the rendered page, drag in blocks, tags, and images."
                                                class="slds-var-m-left_x-small"
                                            >
                                            </lightning-button>
                                            <lightning-button
                                                label="Copy AI Prompt"
                                                icon-name="utility:copy"
                                                onclick={handleCopyEditAiPrompt}
                                                title="Copies a ready-to-paste prompt (your fields + DocGen tag syntax + PDF layout rules) for Claude / ChatGPT / Gemini / Copilot. Paste the returned HTML into the designer."
                                                class="slds-var-m-left_x-small"
                                            >
                                            </lightning-button>
                                            <template if:true={isUploadingHtml}>
                                                <lightning-spinner
                                                    alternative-text="Uploading"
                                                    size="small"
                                                    class="slds-var-m-left_small"
                                                ></lightning-spinner>
                                            </template>
                                        </template>

                                        <template if:true={uploadedFileName}>
                                            <div
                                                class="slds-box slds-box_x-small slds-theme_success slds-var-m-top_medium"
                                            >
                                                <lightning-icon
                                                    icon-name="utility:check"
                                                    size="x-small"
                                                    class="slds-var-m-right_small"
                                                    variant="inverse"
                                                ></lightning-icon>
                                                <strong>Ready to Save:</strong> {uploadedFileName}
                                            </div>
                                        </template>

                                        <template if:true={hasUploadedPdfAcroFormFields}>
                                            <div
                                                class="slds-box slds-box_x-small slds-theme_info slds-var-m-top_medium"
                                            >
                                                <lightning-icon
                                                    icon-name="utility:form"
                                                    size="x-small"
                                                    class="slds-var-m-right_small"
                                                    variant="inverse"
                                                ></lightning-icon>
                                                {pdfAcroFormFieldCount} fillable field mappings are ready on the
                                                <strong>Fillable Fields</strong> tab.
                                            </div>
                                        </template>

                                        <p class="slds-text-body_small slds-var-m-top_medium slds-text-color_weak">
                                            <strong>Note:</strong> Uploading attaches the file. You must click
                                            <strong>"Save as New Version"</strong> below to create a new snapshot.
                                        </p>
                                    </div>
                                </div>

                                <!-- Version History -->
                                <div>
                                    <h3 class="slds-text-heading_small slds-var-m-bottom_medium">Version History</h3>

                                    <template if:false={hasVersions}>
                                        <div
                                            class="slds-text-color_weak slds-var-p-around_large slds-text-align_center slds-box slds-theme_shade"
                                            style="border-radius: 8px"
                                        >
                                            <p>No versions available yet.</p>
                                            <p class="slds-text-body_small">Upload a file and save to create v1.</p>
                                        </div>
                                    </template>

                                    <template if:true={hasVersions}>
                                        <div class="table-container" style="max-height: 300px; overflow-y: auto">
                                            <lightning-datatable
                                                key-field="Id"
                                                data={versions}
                                                columns={versionColumns}
                                                onrowaction={handleRestoreVersion}
                                                column-widths-mode="auto"
                                                hide-checkbox-column
                                            >
                                            </lightning-datatable>
                                        </div>
                                    </template>
                                </div>
                            </div>
                        </lightning-tab>
                    </lightning-tabset>
                </div>
                <footer class="slds-modal__footer slds-theme_default">
                    <div class="slds-grid slds-grid_align-end">
                        <div class="slds-col">
                            <lightning-button
                                variant="neutral"
                                label="Close"
                                onclick={closeEditModal}
                            ></lightning-button>
                            <lightning-button
                                variant="brand"
                                label="Save as New Version"
                                onclick={handleSaveAndClose}
                                class="slds-var-m-left_small"
                            ></lightning-button>
                        </div>
                    </div>
                </footer>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>

    <!-- Preview Modal -->
    <template if:true={isPreviewModalOpen}>
        <section
            role="dialog"
            tabindex="-1"
            aria-modal="true"
            aria-labelledby="preview-modal-title"
            onkeydown={handlePreviewModalKeydown}
            class="slds-modal slds-fade-in-open slds-modal_medium"
        >
            <div class="slds-modal__container">
                <header class="slds-modal__header">
                    <lightning-button-icon
                        icon-name="utility:close"
                        alternative-text="Close"
                        title="Close"
                        variant="bare"
                        class="slds-button slds-button_icon slds-modal__close"
                        onclick={closePreviewModal}
                    ></lightning-button-icon>
                    <h2 id="preview-modal-title" class="slds-text-heading_medium">
                        Version Preview: {previewVersion.VersionNumber}
                    </h2>
                </header>
                <div class="slds-modal__content slds-var-p-around_large">
                    <div class="slds-grid slds-gutters slds-var-m-bottom_large">
                        <div class="slds-col slds-size_1-of-3">
                            <p class="slds-text-body_small slds-text-color_weak">Created</p>
                            <p>
                                <lightning-formatted-date-time
                                    value={previewVersion.CreatedDate}
                                    year="numeric"
                                    month="short"
                                    day="numeric"
                                    hour="2-digit"
                                    minute="2-digit"
                                ></lightning-formatted-date-time>
                            </p>
                        </div>
                        <div class="slds-col slds-size_1-of-3">
                            <p class="slds-text-body_small slds-text-color_weak">Created By</p>
                            <p>{previewVersion.CreatedByName}</p>
                        </div>
                        <div class="slds-col slds-size_1-of-3">
                            <p class="slds-text-body_small slds-text-color_weak">Status</p>
                            <p>
                                <template if:true={isPreviewVersionActive}>
                                    <lightning-badge label="Active" class="slds-theme_success"></lightning-badge>
                                </template>
                                <template if:false={isPreviewVersionActive}>
                                    <lightning-badge label="Inactive"></lightning-badge>
                                </template>
                            </p>
                        </div>
                    </div>

                    <div class="slds-box slds-var-m-bottom_large" style="border-radius: 8px">
                        <h3 class="slds-text-heading_small slds-var-m-bottom_medium">Query Configuration</h3>
                        <template if:true={hasPreviewVersionQuery}>
                            <pre
                                class="slds-var-p-around_medium slds-theme_shade"
                                style="
                                    white-space: pre-wrap;
                                    word-break: break-word;
                                    font-size: 0.85rem;
                                    border-radius: 6px;
                                "
                            >
{previewVersionQueryFormatted}</pre
                            >
                        </template>
                        <template if:false={hasPreviewVersionQuery}>
                            <p class="slds-text-color_weak">No query configuration saved.</p>
                        </template>
                    </div>

                    <div class="slds-box slds-theme_shade" style="border-radius: 8px">
                        <div class="slds-grid slds-grid_align-spread slds-grid_vertical-align-center">
                            <div>
                                <h3 class="slds-text-heading_small">Generate Sample</h3>
                                <p class="slds-text-body_small slds-text-color_weak">
                                    Test this version using the selected sample record.
                                </p>
                            </div>
                            <lightning-button
                                label="Generate"
                                icon-name="utility:page"
                                variant="brand"
                                onclick={handlePreviewGenerate}
                                disabled={previewGenerateDisabled}
                            ></lightning-button>
                        </div>
                        <template if:true={isGeneratingPreview}>
                            <div class="slds-var-m-top_medium slds-is-relative" style="height: 40px">
                                <lightning-spinner alternative-text="Generating..." size="small"></lightning-spinner>
                            </div>
                        </template>
                    </div>
                </div>
                <footer class="slds-modal__footer slds-theme_default">
                    <lightning-button
                        label="Close"
                        onclick={closePreviewModal}
                        class="slds-var-m-right_small"
                    ></lightning-button>
                    <lightning-button
                        label="Activate This Version"
                        variant="brand"
                        onclick={handleRestoreFromPreview}
                        disabled={isPreviewVersionActive}
                    ></lightning-button>
                </footer>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>
</template>
