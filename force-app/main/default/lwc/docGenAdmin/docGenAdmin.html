                                onclick={handlePrevStep}
                                disabled={isBackDisabled}
                                class="slds-var-m-right_small"
                            >
                            </lightning-button>

                            <template if:false={isStep3}>
                                <lightning-button label="Next" variant="brand" onclick={handleNextStep}>
                                </lightning-button>
                            </template>
                            <template if:true={isStep3}>
                                <lightning-button label="Create Template" variant="success" onclick={createTemplate}>
                                </lightning-button>
                            </template>
                        </div>
                    </div>
                </div>
            </lightning-tab>

            <lightning-tab label="Your Templates" value="list" onactive={handleTabActive}>
                <div class="slds-var-p-around_large">
                    <div class="slds-grid slds-grid_vertical-align-end slds-var-m-bottom_large">
                        <div class="slds-col slds-size_1-of-3">
                            <lightning-input
                                type="search"
                                label="Search Templates"
                                placeholder="Search by Name, Category, or Object..."
                                value={searchKey}
                                onchange={handleSearch}
                            >
                            </lightning-input>
                        </div>
                        <div class="slds-col slds-var-p-left_medium">
                            <lightning-button
                                icon-name="utility:refresh"
                                onclick={handleRefresh}
                                label="Refresh"
                                title="Refresh Templates"
                                variant="neutral"
                            >
                            </lightning-button>
                        </div>
                        <div class="slds-col slds-var-p-left_medium">
                            <lightning-button
                                icon-name="utility:upload"
                                onclick={handleImportClick}
                                label="Import Template"
                                title="Import a .docgen.json template file"
                                variant="neutral"
                            >
                            </lightning-button>
                            <input
                                type="file"
                                data-id="importFileInput"
                                accept=".json"
                                style="display: none"
                                onchange={handleImportFile}
                            />
                        </div>
                    </div>
                    <template if:true={isInstallingSamples}>
                        <div class="slds-var-p-around_xx-large slds-text-align_center">
                            <lightning-spinner
                                alternative-text="Installing sample templates..."
                                size="medium"
                            ></lightning-spinner>
                            <p class="slds-var-m-top_large slds-text-heading_small">Installing sample templates...</p>
                            <p class="slds-text-body_small slds-text-color_weak slds-var-m-top_small">
                                Creating 5 templates with DOCX files and query configs
                            </p>
                        </div>
                    </template>
                    <template if:false={isInstallingSamples}>
                        <div class="table-container">
                            <lightning-datatable
                                key-field="Id"
                                data={filteredTemplates}
                                columns={columns}
                                onrowaction={handleRowAction}
                                hide-checkbox-column
                            >
                            </lightning-datatable>
                        </div>
                    </template>
                </div>
            </lightning-tab>

            <!-- Full-screen template designer: the page is the canvas, palettes ride the rail -->
            <lightning-tab label="Designer" value="design" onactive={handleTabActive}>
                <div class="slds-var-p-around_medium">
                    <template if:false={designerHasTemplate}>
                        <div class="slds-text-align_center slds-var-p-around_xx-large slds-text-color_weak">
                            <lightning-icon icon-name="utility:brush" size="medium"></lightning-icon>
                            <p class="slds-text-heading_small slds-var-m-top_small slds-var-m-bottom_x-small">
                                No template open
                            </p>
                            <p class="slds-text-body_small">
                                Pick an HTML template under&nbsp;<strong>Your Templates</strong>&nbsp;and choose
                                the&nbsp;<strong>Design</strong>&nbsp;row action — or build one from&nbsp;<strong
                                    >Create New</strong
                                >.
                            </p>
                        </div>
                    </template>
                    <template if:true={designerHasTemplate}>
                        <div class="dg-designer-toolbar">
                            <div class="dg-designer-toolbar__title">
                                <lightning-icon icon-name="utility:brush" size="small"></lightning-icon>
                                <span class="slds-text-heading_small">{designerTitle}</span>
                            </div>
                            <template if:true={isRealObject}>
                                <div class="dg-designer-toolbar__sample">
                                    <lightning-record-picker
                                        label="Sample Record"
                                        variant="label-hidden"
                                        object-api-name={editTemplateObject}
                                        value={editTemplateTestRecordId}
                                        onchange={handleEditTestRecordChange}
                                        placeholder="Sample record for previews..."
                                    >
                                    </lightning-record-picker>
                                </div>
                                <lightning-button
                                    label="Generate Sample"
                                    icon-name="utility:page"
                                    onclick={handleTestGenerate}
                                    disabled={editGenerateSampleDisabled}
                                ></lightning-button>
                                <template if:true={isLoadingVersions}>
                                    <lightning-spinner alternative-text="Working..." size="small"></lightning-spinner>
                                </template>
                            </template>
                            <div class="dg-designer-toolbar__actions">
                                <lightning-button
                                    variant="brand"
                                    label="Save as New Version"
                                    icon-name="utility:save"
                                    onclick={handleSaveAndClose}
                                ></lightning-button>
                                <lightning-button
                                    label="Back to Templates"
                                    icon-name="utility:back"
                                    onclick={handleCloseDesigner}
                                    class="slds-var-m-left_x-small"
                                ></lightning-button>
                            </div>
                        </div>

                        <div class="dg-html-editor-statusbar">
                            <div class="dg-mode-seg" role="tablist" aria-label="Editor mode">
                                <button
                                    class={visualModeBtnClass}
                                    onclick={handleSelectVisualMode}
                                    title="Edit the document as it renders — click anywhere and type"
                                >
                                    Visual
                                </button>
                                <button
                                    class={sourceModeBtnClass}
                                    onclick={handleSelectSourceMode}
                                    title="Edit the raw HTML with a live full-page preview below"
                                >
                                    Source
                                </button>
                            </div>
                            <template if:true={selectionContextLabel}>
                                <span class="dg-context-label">{selectionContextLabel}</span>
                            </template>
                            <span class={htmlEditorStatusClass}>{htmlEditorStatusText}</span>
                            <span class="dg-fmt-label">Page</span>
                            <select
                                class="dg-page-select"
                                data-field="size"
                                onchange={handlePageSetupChange}
                                title="Page size"
                            >
                                <option value="Letter">Letter</option>
                                <option value="Legal">Legal</option>
                                <option value="A4">A4</option>
                                <option value="Custom">Custom…</option>
                            </select>
                            <template if:false={isCustomPageSize}>
                                <select
                                    class="dg-page-select"
                                    data-field="orient"
                                    onchange={handlePageSetupChange}
                                    title="Orientation"
                                >
                                    <option value="portrait">Portrait</option>
                                    <option value="landscape">Landscape</option>
                                </select>
                            </template>
                            <template if:true={isCustomPageSize}>
                                <input
                                    type="number"
                                    class="dg-page-input"
                                    data-field="customW"
                                    min="1"
                                    max="200"
                                    step="0.25"
                                    onchange={handlePageSetupChange}
                                    title="Page width in inches"
                                />
                                <span class="dg-fmt-label">×</span>
                                <input
                                    type="number"
                                    class="dg-page-input"
                                    data-field="customH"
                                    min="1"
                                    max="200"
                                    step="0.25"
                                    onchange={handlePageSetupChange}
                                    title="Page height in inches"
                                />
                                <span class="dg-fmt-label">in</span>
                            </template>
                            <select
                                class="dg-page-select"
                                data-field="margin"
                                onchange={handlePageSetupChange}
                                title="Page margins"
                            >
                                <option value="0.5">0.5&quot; margins</option>
                                <option value="0.75">0.75&quot; margins</option>
                                <option value="1">1&quot; margins</option>
                                <option value="custom">Custom…</option>
                            </select>
                            <template if:true={isCustomMargin}>
                                <input
                                    type="number"
                                    class="dg-page-input"
                                    data-field="customMargin"
                                    min="0"
                                    max="10"
                                    step="0.05"
                                    onchange={handlePageSetupChange}
                                    title="Margin in inches"
                                />
                                <span class="dg-fmt-label">in</span>
                            </template>
                            <lightning-button
                                label="Format Code"
                                icon-name="utility:magicwand"
                                variant="base"
                                data-target="body"
                                onclick={handleFormatHtml}
                                title="Pretty-print the HTML: indent nested tags without touching text or merge tags."
                                class="slds-var-m-left_small"
                            ></lightning-button>
                            <lightning-button
                                label="Reload"
                                icon-name="utility:refresh"
                                variant="base"
                                onclick={handleReloadHtmlBodyEditor}
                                title="Replace the editor contents with the currently staged body (or the saved body if nothing is staged). Discards unapplied edits."
                                class="slds-var-m-left_small"
                            ></lightning-button>
                        </div>

                        <div class="dg-designer-layout">
                            <div class="dg-designer-canvas-col">
                                <template if:true={pillMenu}>
                                    <div class="dg-pill-menu" style={pillMenu.posStyle} role="menu">
                                        <div class="dg-pill-menu-head">
                                            <code>{pillMenu.tagText}</code>
                                            <button class="dg-pill-menu-x" onclick={handlePillMenuClose} title="Close">
                                                &#10005;
                                            </button>
                                        </div>
                                        <template if:true={pillMenu.hasOptions}>
                                            <template for:each={pillMenu.options} for:item="opt">
                                                <button
                                                    key={opt.key}
                                                    class="dg-pill-menu-item"
                                                    data-tag={opt.tag}
                                                    onclick={handlePillTransform}
                                                >
                                                    {opt.label}
                                                </button>
                                            </template>
                                        </template>
                                        <button class="dg-pill-menu-item" onclick={handlePillEdit}>
                                            Edit tag&#8230; (or double-click the pill)
                                        </button>
                                        <button
                                            class="dg-pill-menu-item dg-pill-menu-remove"
                                            onclick={handlePillRemove}
                                        >
                                            Remove from document
                                        </button>
                                    </div>
                                </template>
                                <template if:true={isLoadingHtmlBody}>
                                    <div class="slds-is-relative" style="height: 40px">
                                        <lightning-spinner
                                            alternative-text="Loading HTML body"
                                            size="small"
                                        ></lightning-spinner>
                                    </div>
                                </template>
                                <div class={codeSplitClass}>
                                    <textarea
                                        class={designerEditorClass}
                                        spellcheck="false"
                                        aria-label="Template HTML body"
                                        oninput={handleHtmlBodyEditorInput}
                                        placeholder="Paste your template HTML here — from your AI assistant, Google Docs (File → Download → Web Page), or hand-written. Merge tags like &#123;Name&#125; fill from your Query Config."
                                    ></textarea>
                                </div>
                                <template if:true={showHtmlBodyVisual}>
                                    <div class="dg-format-bar" role="toolbar" aria-label="Text formatting">
                                        <button
                                            class="dg-fmt-btn"
                                            data-cmd="bold"
                                            onmousedown={handleFmtMouseDown}
                                            onclick={handleFormatAction}
                                            title="Bold"
                                        >
                                            <b>B</b>
                                        </button>
                                        <button
                                            class="dg-fmt-btn"
                                            data-cmd="italic"
                                            onmousedown={handleFmtMouseDown}
                                            onclick={handleFormatAction}
                                            title="Italic"
                                        >
                                            <i>I</i>
                                        </button>
                                        <button
                                            class="dg-fmt-btn"
                                            data-cmd="underline"
                                            onmousedown={handleFmtMouseDown}
                                            onclick={handleFormatAction}
                                            title="Underline"
                                        >
                                            <u>U</u>
                                        </button>
                                        <button
                                            class="dg-fmt-btn"
                                            data-cmd="strikeThrough"
                                            onmousedown={handleFmtMouseDown}
                                            onclick={handleFormatAction}
                                            title="Strikethrough"
                                        >
                                            <s>S</s>
                                        </button>
                                        <button
                                            class="dg-fmt-btn"
                                            data-cmd="superscript"
                                            onmousedown={handleFmtMouseDown}
                                            onclick={handleFormatAction}
                                            title="Superscript"
                                        >
                                            x&#178;
                                        </button>
                                        <button
                                            class="dg-fmt-btn"
                                            data-cmd="subscript"
                                            onmousedown={handleFmtMouseDown}
                                            onclick={handleFormatAction}
                                            title="Subscript"
                                        >
                                            x&#8322;
                                        </button>
                                        <span class="dg-fmt-sep"></span>
                                        <button
                                            class="dg-fmt-btn dg-fmt-btn_word"
                                            data-cmd="insertUnorderedList"
                                            onmousedown={handleFmtMouseDown}
                                            onclick={handleFormatAction}
                                            title="Bulleted list"
                                        >
                                            &#8226; List
                                        </button>
                                        <button
                                            class="dg-fmt-btn dg-fmt-btn_word"
                                            data-cmd="insertOrderedList"
                                            onmousedown={handleFmtMouseDown}
                                            onclick={handleFormatAction}
                                            title="Numbered list"
                                        >
                                            1. List
                                        </button>
                                        <span class="dg-fmt-sep"></span>
                                        <button
                                            class="dg-fmt-btn dg-fmt-btn_word"
                                            data-cmd="justifyLeft"
                                            onmousedown={handleFmtMouseDown}
                                            onclick={handleFormatAction}
                                            title="Align left"
                                        >
                                            Left
                                        </button>
                                        <button
                                            class="dg-fmt-btn dg-fmt-btn_word"
                                            data-cmd="justifyCenter"
                                            onmousedown={handleFmtMouseDown}
                                            onclick={handleFormatAction}
                                            title="Align center"
                                        >
                                            Center
                                        </button>
                                        <button
                                            class="dg-fmt-btn dg-fmt-btn_word"
                                            data-cmd="justifyRight"
                                            onmousedown={handleFmtMouseDown}
                                            onclick={handleFormatAction}
                                            title="Align right"
                                        >
                                            Right
                                        </button>
                                        <span class="dg-fmt-sep"></span>
                                        <button
                                            class="dg-fmt-btn dg-fmt-btn_word"
                                            data-cmd="fontSize"
                                            data-value="2"
                                            onmousedown={handleFmtMouseDown}
                                            onclick={handleFormatAction}
                                            title="Small text"
                                        >
                                            S
                                        </button>
                                        <button
                                            class="dg-fmt-btn dg-fmt-btn_word"
                                            data-cmd="fontSize"
                                            data-value="3"
                                            onmousedown={handleFmtMouseDown}
                                            onclick={handleFormatAction}
                                            title="Normal text"
                                        >
                                            M
                                        </button>
                                        <button
                                            class="dg-fmt-btn dg-fmt-btn_word"
                                            data-cmd="fontSize"
                                            data-value="5"
                                            onmousedown={handleFmtMouseDown}
                                            onclick={handleFormatAction}
                                            title="Large text"
                                        >
                                            L
                                        </button>
                                        <button
                                            class="dg-fmt-btn dg-fmt-btn_word"
                                            data-cmd="fontSize"
                                            data-value="6"
                                            onmousedown={handleFmtMouseDown}
                                            onclick={handleFormatAction}
                                            title="Extra large text"
                                        >
                                            XL
                                        </button>
                                        <span class="dg-fmt-sep"></span>
                                        <span class="dg-fmt-label" title="Text color">A</span>
                                        <template for:each={textColorSwatches} for:item="sw">
                                            <button
                                                key={sw.key}
                                                class="dg-fmt-swatch"
                                                style={sw.style}
                                                data-cmd="foreColor"
                                                data-value={sw.value}
                                                onmousedown={handleFmtMouseDown}
                                                onclick={handleFormatAction}
                                                title={sw.title}
                                            ></button>
                                        </template>
                                        <input
                                            type="color"
                                            class="dg-fmt-colorpick"
                                            data-cmd="foreColor"
                                            value="#1f3a5f"
                                            onmousedown={handleColorPickMouseDown}
                                            onchange={handleColorPickChange}
                                            title="Custom text color — any color you want"
                                        />
                                        <span class="dg-fmt-sep"></span>
                                        <span class="dg-fmt-label" title="Highlight color">BG</span>
                                        <template for:each={highlightSwatches} for:item="sw">
                                            <button
                                                key={sw.key}
                                                class="dg-fmt-swatch"
                                                style={sw.style}
                                                data-cmd="hiliteColor"
                                                data-value={sw.value}
                                                onmousedown={handleFmtMouseDown}
                                                onclick={handleFormatAction}
                                                title={sw.title}
                                            ></button>
                                        </template>
                                        <input
                                            type="color"
                                            class="dg-fmt-colorpick"
                                            data-cmd="hiliteColor"
                                            value="#fef3c7"
                                            onmousedown={handleColorPickMouseDown}
                                            onchange={handleColorPickChange}
                                            title="Custom highlight color"
                                        />
                                        <span class="dg-fmt-sep"></span>
                                        <span
                                            class="dg-fmt-label"
                                            title="Font — the PDF engine ships exactly these four"
                                            >Font</span
                                        >
                                        <template for:each={fontChoices} for:item="font">
                                            <button
                                                key={font.key}
                                                class="dg-fmt-btn dg-fmt-btn_word"
                                                style={font.style}
                                                data-cmd="fontName"
                                                data-value={font.value}
                                                onmousedown={handleFmtMouseDown}
                                                onclick={handleFormatAction}
                                                title={font.title}
                                            >
                                                {font.label}
                                            </button>
                                        </template>
                                        <span class="dg-fmt-sep"></span>
                                        <button
                                            class="dg-fmt-btn dg-fmt-btn_word"
                                            data-cmd="removeFormat"
                                            onmousedown={handleFmtMouseDown}
                                            onclick={handleFormatAction}
                                            title="Clear formatting from the selection"
                                        >
                                            Clear
                                        </button>
                                        <button
                                            class="dg-fmt-btn dg-fmt-btn_word"
                                            data-cmd="undo"
                                            onmousedown={handleFmtMouseDown}
                                            onclick={handleFormatAction}
                                            title="Undo"
                                        >
                                            &#8630; Undo
                                        </button>
                                        <button
                                            class="dg-fmt-btn dg-fmt-btn_word"
                                            data-cmd="redo"
                                            onmousedown={handleFmtMouseDown}
                                            onclick={handleFormatAction}
                                            title="Redo"
                                        >
                                            &#8631; Redo
                                        </button>
                                        <span class="dg-fmt-break"></span>
                                        <span class="dg-fmt-label" title="Table tools — put your cursor in a cell first"
                                            >Table</span
                                        >
                                        <button
                                            class="dg-fmt-btn dg-fmt-btn_word"
                                            onmousedown={handleFmtMouseDown}
                                            onclick={handleInsertTable}
                                            title="Insert a 3-column table at your cursor"
                                        >
                                            + Table
                                        </button>
                                        <button
                                            class="dg-fmt-btn dg-fmt-btn_word"
                                            data-taction="rowAfter"
                                            onmousedown={handleFmtMouseDown}
                                            onclick={handleTableAction}
                                            title="Add a row below the current cell"
                                        >
                                            + Row
                                        </button>
                                        <button
                                            class="dg-fmt-btn dg-fmt-btn_word"
                                            data-taction="colAfter"
                                            onmousedown={handleFmtMouseDown}
                                            onclick={handleTableAction}
                                            title="Add a column to the right of the current cell"
                                        >
                                            + Col
                                        </button>
                                        <button
                                            class="dg-fmt-btn dg-fmt-btn_word"
                                            data-taction="rowDel"
                                            onmousedown={handleFmtMouseDown}
                                            onclick={handleTableAction}
                                            title="Delete the current row"
                                        >
                                            − Row
                                        </button>
                                        <button
                                            class="dg-fmt-btn dg-fmt-btn_word"
                                            data-taction="colDel"
                                            onmousedown={handleFmtMouseDown}
                                            onclick={handleTableAction}
                                            title="Delete the current column"
                                        >
                                            − Col
                                        </button>
                                        <button
                                            class="dg-fmt-btn dg-fmt-btn_word"
                                            data-taction="headerRow"
                                            onmousedown={handleFmtMouseDown}
                                            onclick={handleTableAction}
                                            title="Style the current row as a header (navy fill, white bold text)"
                                        >
                                            Header Row
                                        </button>
                                        <span class="dg-fmt-sep"></span>
                                        <span class="dg-fmt-label" title="Table borders">Borders</span>
                                        <button
                                            class="dg-fmt-btn dg-fmt-btn_word"
                                            data-taction="bordersAll"
                                            onmousedown={handleFmtMouseDown}
                                            onclick={handleTableAction}
                                            title="Full grid — every cell outlined"
                                        >
                                            All
                                        </button>
                                        <button
                                            class="dg-fmt-btn dg-fmt-btn_word"
                                            data-taction="bordersOutline"
                                            onmousedown={handleFmtMouseDown}
                                            onclick={handleTableAction}
                                            title="Outline around the table only"
                                        >
                                            Outline
                                        </button>
                                        <button
                                            class="dg-fmt-btn dg-fmt-btn_word"
                                            data-taction="bordersRows"
                                            onmousedown={handleFmtMouseDown}
                                            onclick={handleTableAction}
                                            title="Horizontal row lines only"
                                        >
                                            Rows
                                        </button>
                                        <button
                                            class="dg-fmt-btn dg-fmt-btn_word"
                                            data-taction="bordersNone"
                                            onmousedown={handleFmtMouseDown}
                                            onclick={handleTableAction}
                                            title="No borders"
                                        >
                                            None
                                        </button>
                                        <span
                                            class="dg-fmt-label"
                                            title="Fill the current cell — or, outside a table, the paragraph/panel the cursor is in"
                                            >Fill</span
                                        >
                                        <template for:each={highlightSwatches} for:item="sw">
                                            <button
                                                key={sw.key}
                                                class="dg-fmt-swatch"
                                                style={sw.style}
                                                data-taction="cellFill"
                                                data-value={sw.value}
                                                onmousedown={handleFmtMouseDown}
                                                onclick={handleTableAction}
                                                title={sw.title}
                                            ></button>
                                        </template>
                                        <input
                                            type="color"
                                            class="dg-fmt-colorpick"
                                            data-cmd="cellFill"
                                            value="#f2f4f7"
                                            onmousedown={handleColorPickMouseDown}
                                            onchange={handleColorPickChange}
                                            title="Custom cell fill color"
                                        />
                                    </div>
                                    <div
                                        class="dg-html-preview-frame dg-visual-host dg-designer-size"
                                        lwc:dom="manual"
                                        title="Visual editing — click into the page and type"
                                    ></div>
                                    <p class="slds-text-body_small slds-text-color_weak slds-var-m-top_xx-small">
                                        This is your document — click anywhere and type. The colored pills are your data
                                        fields. Drag anything from the rail on the right straight onto the page.
                                        Deleting a pill removes the whole field — they can't break. Your styles and page
                                        setup are never touched here.
                                    </p>
                                </template>
                                <div class="slds-var-m-top_x-small">
                                    <lightning-button
                                        variant="brand"
                                        label="Apply Editor HTML"
                                        icon-name="utility:check"
                                        onclick={handleApplyHtmlBody}
                                        disabled={isApplyingHtmlBody}
                                    ></lightning-button>
                                    <lightning-button
                                        label="Copy AI Prompt"
                                        icon-name="utility:copy"
                                        onclick={handleCopyEditAiPrompt}
                                        title="Copies a ready-to-paste prompt (your fields + DocGen tag syntax + PDF layout rules) for Claude / ChatGPT / Gemini / Copilot."
                                        class="slds-var-m-left_x-small"
                                    ></lightning-button>
                                    <template if:true={isApplyingHtmlBody}>
                                        <lightning-spinner
                                            alternative-text="Applying"
                                            size="small"
                                            class="slds-var-m-left_small"
                                        ></lightning-spinner>
                                    </template>
                                    <span class="slds-text-body_small slds-text-color_weak slds-var-m-left_small">
                                        Stage your changes, then "Save as New Version" makes them the active body.
                                    </span>
                                </div>
                            </div>

                            <div class="dg-designer-rail">
                                <div class="dg-rail-section-label">
                                    <lightning-icon icon-name="utility:apps" size="xx-small"></lightning-icon>
                                    Blocks
                                </div>
                                <div class="dg-tag-panel">
                                    <template for:each={blockPaletteSections} for:item="section">
                                        <div key={section.key} class="dg-tag-section">
                                            <div class="dg-tag-section-label">{section.label}</div>
                                            <template if:true={section.hint}>
                                                <div class="dg-tag-section-hint">{section.hint}</div>
                                            </template>
                                            <div class="dg-tag-chips">
                                                <template for:each={section.items} for:item="blk">
                                                    <button
                                                        key={blk.key}
                                                        class="dg-tag-chip dg-block-chip"
                                                        data-snippet={blk.snippet}
                                                        data-kind="block"
                                                        title={blk.title}
                                                        draggable="true"
                                                        ondragstart={handleTagDragStart}
                                                        onmousedown={handleFmtMouseDown}
                                                        onclick={handleInsertTagSnippet}
                                                    >
                                                        {blk.label}
                                                    </button>
                                                </template>
                                            </div>
                                        </div>
                                    </template>
                                </div>

                                <div class="dg-rail-section-label">
                                    <lightning-icon icon-name="utility:merge_field" size="xx-small"></lightning-icon>
                                    Tags
                                </div>
                                <div class="dg-tag-panel">
                                    <template for:each={tagPaletteSections} for:item="section">
                                        <div key={section.key} class="dg-tag-section">
                                            <div class="dg-tag-section-label">{section.label}</div>
                                            <template if:true={section.hint}>
                                                <div class="dg-tag-section-hint">{section.hint}</div>
                                            </template>
                                            <div class="dg-tag-chips">
                                                <template for:each={section.items} for:item="tag">
                                                    <button
                                                        key={tag.key}
                                                        class="dg-tag-chip"
                                                        data-snippet={tag.snippet}
                                                        title={tag.title}
                                                        draggable="true"
                                                        ondragstart={handleTagDragStart}
                                                        onmousedown={handleFmtMouseDown}
                                                        onclick={handleInsertTagSnippet}
                                                    >
                                                        {tag.label}
                                                    </button>
                                                </template>
                                            </div>
                                        </div>
                                    </template>
                                </div>

                                <div class="dg-rail-section-label">
                                    <lightning-icon icon-name="utility:image" size="xx-small"></lightning-icon>
                                    Images
                                </div>
                                <div class="dg-image-panel">
                                    <div class="dg-image-panel-head">
                                        <span class="slds-text-body_small">
                                            Upload once — click or drag a thumbnail onto the page. PNG or JPG (SVG
                                            doesn't render in PDF).
                                        </span>
                                        <lightning-button
                                            variant="brand"
                                            label="Upload"
                                            icon-name="utility:upload"
                                            onclick={triggerInsertImagePicker}
                                            disabled={isUploadingInsertImage}
                                        ></lightning-button>
                                    </div>
                                    <input
                                        type="file"
                                        class="dg-insert-image-input"
                                        accept=".png,.jpg,.jpeg,.gif,.bmp"
                                        style="display: none"
                                        onchange={handleInsertImageSelected}
                                    />
                                    <template if:true={isUploadingInsertImage}>
                                        <div class="slds-is-relative slds-var-m-top_small" style="height: 30px">
                                            <lightning-spinner
                                                alternative-text="Uploading image"
                                                size="small"
                                            ></lightning-spinner>
                                        </div>
                                    </template>
                                    <template if:true={isLoadingTemplateImages}>
                                        <div class="slds-is-relative slds-var-m-top_small" style="height: 30px">
                                            <lightning-spinner
                                                alternative-text="Loading images"
                                                size="small"
                                            ></lightning-spinner>
                                        </div>
                                    </template>
                                    <template if:true={hasTemplateImages}>
                                        <div class="dg-image-grid">
                                            <template for:each={templateImages} for:item="img">
                                                <div
                                                    key={img.contentVersionId}
                                                    class="dg-image-thumb"
                                                    data-url={img.url}
                                                    data-name={img.fileName}
                                                    draggable="true"
                                                    ondragstart={handleImageDragStart}
                                                    onmousedown={handleFmtMouseDown}
                                                    onclick={handleInsertExistingImage}
                                                    title={img.fileName}
                                                >
                                                    <img src={img.url} alt={img.fileName} />
                                                    <span class="dg-image-thumb-name">{img.fileName}</span>
                                                </div>
                                            </template>
                                        </div>
                                    </template>
                                    <template if:false={hasTemplateImages}>
                                        <p class="slds-text-body_small slds-text-color_weak slds-var-m-top_x-small">
                                            No images attached yet.
                                        </p>
                                    </template>
                                </div>

                                <template if:true={editTemplateOutputIsPdf}>
                                    <div class="dg-rail-section-label">
                                        <lightning-icon icon-name="utility:layers" size="xx-small"></lightning-icon>
                                        Watermark
                                    </div>
                                    <div class="dg-image-panel">
                                        <p class="slds-text-body_small slds-var-m-bottom_x-small">
                                            Full-page background image behind your content (PDF output). Pre-fade the
                                            image (~15-20% opacity over white) for a watermark look. Needs a saved
                                            version first.
                                        </p>
                                        <template if:true={watermarkPreviewUrl}>
                                            <div class="dg-watermark-preview">
                                                <img src={watermarkPreviewUrl} alt="Current watermark" />
                                                <lightning-button
                                                    label="Remove"
                                                    icon-name="utility:delete"
                                                    variant="destructive-text"
                                                    onclick={handleClearWatermark}
                                                    disabled={isUploadingWatermark}
                                                ></lightning-button>
                                            </div>
                                        </template>
                                        <input
                                            type="file"
                                            accept="image/*"
                                            onchange={handleWatermarkFileSelected}
                                            disabled={isUploadingWatermark}
                                            class="slds-var-m-top_x-small"
                                        />
                                        <template if:true={isUploadingWatermark}>
                                            <p class="slds-text-body_small slds-var-m-top_x-small">Uploading…</p>
                                        </template>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </template>
                </div>
            </lightning-tab>
        </lightning-tabset>
    </div>

    <!-- Edit Template Modal -->
    <template if:true={isEditModalOpen}>
        <section
            role="dialog"
            tabindex="-1"
            aria-modal="true"
            aria-labelledby="edit-template-modal-title"
            onkeydown={handleEditModalKeydown}
            class="slds-modal slds-fade-in-open slds-modal_large"
        >
            <div class="slds-modal__container modern-modal">
                <header class="slds-modal__header">
                    <lightning-button-icon
                        icon-name="utility:close"
                        alternative-text="Close"
                        title="Close"
                        variant="bare"
                        class="slds-button slds-button_icon slds-modal__close"
                        onclick={closeEditModal}
                    ></lightning-button-icon>
                    <h2 id="edit-template-modal-title" class="slds-text-heading_medium slds-hyphenate">
                        Edit Template Configuration
                    </h2>
                </header>
                <div class="slds-modal__content slds-var-p-around_medium">
                    <!-- Sample Record (persistent across all tabs) — hidden for Apex providers -->
                    <template if:true={isRealObject}>
                        <div class="edit-sample-toolbar">
                            <lightning-icon
                                icon-name="utility:record"
                                size="x-small"
                                alternative-text="Sample Record"
                            ></lightning-icon>
                            <div class="edit-sample-toolbar__picker">
                                <lightning-record-picker
                                    label="Sample Record"
                                    variant="label-hidden"
                                    object-api-name={editTemplateObject}
                                    value={editTemplateTestRecordId}
                                    onchange={handleEditTestRecordChange}
                                    placeholder="Set a sample record for previews..."
                                >
                                </lightning-record-picker>
                            </div>
                            <template if:true={editTemplateTestRecordId}>
                                <span class="edit-sample-toolbar__id slds-text-body_small slds-text-color_weak">
                                    ID: {editTemplateTestRecordId}
                                </span>
                            </template>
                            <lightning-button
                                label="Generate Sample"
                                icon-name="utility:page"
                                variant="brand"
                                onclick={handleTestGenerate}
                                disabled={editGenerateSampleDisabled}
                            ></lightning-button>
                            <template if:true={isLoadingVersions}>
                                <lightning-spinner
                                    alternative-text="Generating..."
                                    size="small"
                                    variant="brand"
                                ></lightning-spinner>
                            </template>
                        </div>
                    </template>

                    <lightning-tabset variant="scoped" active-tab-value={activeEditTab}>
                        <!-- Tab 1: Settings -->
                        <lightning-tab label="Settings" value="details">
                            <!-- Grouped into balanced sections so the tab fits without heavy scrolling -->
                            <div class="slds-var-p-around_small">
                                <h3 class="slds-text-heading_small slds-var-m-bottom_x-small">Template</h3>
                                <div class="slds-grid slds-gutters_large">
                                    <div class="slds-col slds-size_1-of-2">
                                        <lightning-input
                                            label="Template Name"
                                            value={editTemplateName}
                                            onchange={handleEditNameChange}
                                            required
                                        ></lightning-input>
                                        <!-- PHD-9 — stable developer key for Flow lookups -->
                                        <lightning-input
                                            label="API Name"
                                            value={editTemplateApiName}
                                            onchange={handleApiNameChange}
                                            max-length="80"
                                            pattern="[a-zA-Z][a-zA-Z0-9_]*"
                                            message-when-pattern-mismatch="Letters, numbers, and underscores only; must start with a letter."
                                            field-level-help="Stable key for referencing this template from Flows and DocGen Buttons (Template API Name input). Survives sandbox-to-production deploys, unlike the record Id. Must be unique."
                                            class="slds-var-m-top_medium"
                                        ></lightning-input>
                                    </div>
                                    <div class="slds-col slds-size_1-of-2">
                                        <lightning-input
                                            label="Category"
                                            value={editTemplateCategory}
                                            onchange={handleEditCategoryChange}
                                        ></lightning-input>
                                        <lightning-input
                                            label="Base Object API Name"
                                            value={editTemplateObject}
                                            readonly
                                            class="slds-var-m-top_medium"
                                        ></lightning-input>
                                    </div>
                                </div>
                                <lightning-textarea
                                    label="Description"
                                    value={editTemplateDesc}
                                    onchange={handleEditDescChange}
                                    class="slds-var-m-top_medium"
                                ></lightning-textarea>

                                <h3 class="slds-text-heading_small slds-var-m-top_large slds-var-m-bottom_x-small">
                                    Output &amp; Page Setup
                                </h3>
                                <div class="slds-grid slds-gutters_large">
                                    <div class="slds-col slds-size_1-of-2">
                                        <lightning-combobox
                                            label="Type"
                                            value={editTemplateType}
                                            options={typeOptions}
                                            onchange={handleEditTypeChange}
                                            required
                                        ></lightning-combobox>
                                        <lightning-combobox
                                            label="Output Format"
                                            value={editTemplateOutputFormat}
                                            options={outputFormatOptions}
                                            onchange={handleEditOutputFormatChange}
                                            class="slds-var-m-top_medium"
                                            required
                                        ></lightning-combobox>
                                    </div>
                                    <div class="slds-col slds-size_1-of-2">
                                        <template if:true={showEditHtmlOwnsPageBanner}>
                                            <div class="slds-box slds-theme_shade" role="status" aria-live="polite">
                                                <p class="slds-text-body_small">
                                                    <lightning-icon
                                                        icon-name="utility:info"
                                                        size="x-small"
                                                        class="slds-var-m-right_x-small"
                                                    ></lightning-icon>
                                                    Your HTML defines its own <code>@page</code> CSS, so Page Size /
                                                    Orientation / Margins are ignored on render. Edit the
                                                    <code>@page</code> rule inside your HTML to change page setup.
                                                </p>
                                            </div>
                                        </template>
                                        <template if:true={showEditPageLayoutFields}>
                                            <lightning-combobox
                                                label="Page Orientation"
                                                value={editTemplatePageOrientation}
                                                options={pageOrientationOptions}
                                                onchange={handleEditPageOrientationChange}
                                                field-level-help="Portrait or Landscape — applies to PDF output."
                                            ></lightning-combobox>
                                            <lightning-combobox
                                                label="Page Size"
                                                value={editTemplatePageSize}
                                                options={pageSizeOptions}
                                                onchange={handleEditPageSizeChange}
                                                class="slds-var-m-top_medium"
                                                field-level-help="Letter (US default), Legal, or A4 (international)."
                                            ></lightning-combobox>
                                            <lightning-combobox
                                                label="Page Margins"
                                                value={editTemplatePageMargins}
                                                options={pageMarginsOptions}
                                                onchange={handleEditPageMarginsChange}
                                                class="slds-var-m-top_medium"
                                                field-level-help="Default uses 1in portrait / 0.5in landscape. Pick a preset or Custom."
                                            ></lightning-combobox>
                                            <template if:true={showEditCustomMargins}>
                                                <lightning-input
                                                    label="Custom Margins (in)"
                                                    value={editTemplateCustomMargins}
                                                    onchange={handleEditCustomMarginsChange}
                                                    class="slds-var-m-top_medium"
                                                    placeholder="0.75 or 0.5,0.75,0.5,0.75"
                                                    field-level-help="One value applies to all sides; four values are Top,Right,Bottom,Left in inches. Range 0.1–3.0."
                                                ></lightning-input>
                                            </template>
                                        </template>
                                    </div>
                                </div>

                                <h3 class="slds-text-heading_small slds-var-m-top_large slds-var-m-bottom_x-small">
                                    Availability &amp; Document Title
                                </h3>
                                <div class="slds-grid slds-gutters_large">
                                    <div class="slds-col slds-size_1-of-2">
                                        <lightning-input
                                            type="toggle"
                                            label="Active (visible in the document picker)"
                                            checked={editTemplateIsActive}
                                            onchange={handleEditActiveChange}
                                            message-toggle-active="Active"
                                            message-toggle-inactive="Inactive (hidden from picker, still editable here)"
                                        ></lightning-input>
                                        <lightning-input
                                            type="toggle"
                                            label="Default Template for this Object"
                                            checked={editTemplateIsDefault}
                                            onchange={handleEditDefaultChange}
                                            class="slds-var-m-top_medium"
                                            message-toggle-active="Yes"
                                            message-toggle-inactive="No"
                                        ></lightning-input>
                                    </div>
                                    <div class="slds-col slds-size_1-of-2">
                                        <c-doc-gen-title-editor
                                            value={editTemplateTitleFormat}
                                            query-config={editTemplateQuery}
                                            onchange={handleTitleFormatChange}
                                            class="slds-show"
                                        >
                                        </c-doc-gen-title-editor>
                                    </div>
                                </div>

                                <h3 class="slds-text-heading_small slds-var-m-top_large slds-var-m-bottom_x-small">
                                    E-Signature Defaults
                                </h3>
                                <div class="slds-grid slds-gutters_large">
                                    <div class="slds-col slds-size_1-of-2">
                                        <!-- #verification — template-level signer-verification defaults -->
                                        <lightning-combobox
                                            label="Signer Verification (e-sign)"
                                            value={editTemplateSignerVerification}
                                            options={signerVerificationOptions}
                                            onchange={handleSignerVerificationChange}
                                            field-level-help="Whether signers of this template must verify a one-time email code before signing. Inherit uses the org default; individual sends can still override."
                                        ></lightning-combobox>
                                        <lightning-combobox
                                            label="Pre-fill Signer Email"
                                            value={editTemplatePrefillSignerEmail}
                                            options={prefillSignerEmailOptions}
                                            onchange={handlePrefillSignerEmailChange}
                                            field-level-help="When verification is on, auto-send the code to the signer's known email and skip the 'type your email' step. Inherit uses the org default."
                                            class="slds-var-m-top_medium"
                                        ></lightning-combobox>
                                    </div>
                                    <div class="slds-col slds-size_1-of-2">
                                        <!-- #208 — per-template default email message -->
                                        <lightning-textarea
                                            label="Default Email Message (e-sign)"
                                            value={editTemplateDefaultEmailMessage}
                                            onchange={handleDefaultEmailMessageChange}
                                            max-length="4000"
                                            field-level-help="Default text for the {Message} token in signature request emails sent from this template. Pre-filled for the sender; a message typed at send time always wins. Blank uses the generic default."
                                        ></lightning-textarea>
                                    </div>
                                </div>
                            </div>

                            <!-- 1.47 — Visibility & sort controls -->
                            <div class="slds-var-p-horizontal_small slds-var-m-top_large">
                                <h3 class="slds-text-heading_small slds-var-m-bottom_x-small">Visibility &amp; Sort</h3>
                                <p class="slds-text-body_small slds-text-color_weak slds-var-m-bottom_small">
                                    Control which records and which users see this template in the runner, signature
                                    sender, bulk picker, and Flow.
                                </p>
                                <div class="slds-grid slds-gutters_medium">
                                    <div class="slds-col slds-size_1-of-2">
                                        <lightning-input
                                            type="number"
                                            label="Sort Order"
                                            field-level-help="Lower numbers appear higher in the picker. Blank = sort by Default-first then Name."
                                            value={editTemplateSortOrder}
                                            onchange={handleEditSortOrderChange}
                                        >
                                        </lightning-input>
                                        <lightning-input
                                            type="toggle"
                                            label="Lock Output Format"
                                            field-level-help="When ON, the runner won't let users override the Output Format at runtime."
                                            checked={editTemplateLockOutputFormat}
                                            onchange={handleEditLockOutputChange}
                                            message-toggle-active="Locked"
                                            message-toggle-inactive="Unlocked"
                                            class="slds-var-m-top_medium"
                                        >
                                        </lightning-input>
                                    </div>
                                    <div class="slds-col slds-size_1-of-2">
                                        <lightning-textarea
                                            label="Specific Record Ids"
                                            field-level-help="Comma-separated 18-char record Ids (e.g. 001AB0000000001AAA, 001AB0000000002AAA). When set, the template only appears for those records. Blank = applies to ALL records of the Base Object."
                                            value={editTemplateSpecificRecordIds}
                                            onchange={handleEditSpecificRecordIdsChange}
                                        >
                                        </lightning-textarea>
                                        <lightning-textarea
                                            label="Required Permission Sets"
                                            field-level-help="Comma-separated permission set API names (e.g. DocGen_Executive_Templates, DocGen_Finance_Templates). Users need at least ONE assigned to see this template. Blank = visible to all DocGen users."
                                            value={editTemplateRequiredPermissionSets}
                                            onchange={handleEditRequiredPermSetsChange}
                                            class="slds-var-m-top_medium"
                                        >
                                        </lightning-textarea>
                                    </div>
                                </div>

                                <!-- 1.48 — Record Filter (SOQL WHERE clause) — power users -->
                                <div class="slds-var-m-top_medium">
                                    <lightning-textarea
                                        label="Record Filter (SOQL WHERE clause)"
                                        field-level-help="Advanced / power users. SOQL WHERE clause evaluated against the current record. Examples: Type = 'Customer'  |  Industry IN ('Technology','Media')  |  Annual_Revenue__c > 1000000 AND BillingCountry = 'US'. Wins over Specific Record Ids when both set. Blank = no filter."
                                        value={editTemplateRecordFilter}
                                        onchange={handleEditRecordFilterChange}
                                    >
                                    </lightning-textarea>
                                    <div class="slds-var-m-top_x-small">
                                        <lightning-button
                                            label="Test Against Sample Record"
                                            icon-name="utility:check"
                                            variant="neutral"
                                            onclick={handleTestRecordFilter}
                                            disabled={editTemplateRecordFilterTesting}
                                        >
                                        </lightning-button>
                                        <span class="slds-text-body_small slds-text-color_weak slds-var-m-left_small"
                                            >Tests the clause against the Sample Test Record Id on this template.</span
                                        >
                                    </div>
                                    <div class={recordFilterResultClass}>{editTemplateRecordFilterResultMessage}</div>
                                </div>
                            </div>
                        </lightning-tab>

                        <!-- Tab 1b: HTML Header / Footer (HTML type only) -->
                        <template if:true={isEditTypeHtml}>
                            <lightning-tab label="Header / Footer" value="headerFooter">
                                <div class="slds-var-p-around_small">
                                    <div
                                        class="slds-box slds-theme_shade slds-var-m-bottom_medium"
                                        style="font-size: 0.85rem"
                                    >
                                        Content placed in the page margins of every page. Supports merge tags including
                                        <code>&#123;PageNumber&#125;</code> and <code>&#123;TotalPages&#125;</code>.
                                        Leave blank to omit.
                                    </div>
                                    <div
                                        class="slds-var-m-top_small"
                                        style="display: flex; align-items: center; justify-content: space-between"
                                    >
