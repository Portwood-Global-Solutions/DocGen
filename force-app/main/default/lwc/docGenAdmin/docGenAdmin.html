<template>
    <div class="admin-workspace" onannounce={handleA11yAnnounce}>
        <!-- Page-level ARIA live region. Children dispatch a bubbling
             CustomEvent('announce', {detail:{message:'…'}, composed:true}) and
             we mirror the message text here so screen readers announce it. -->
        <div aria-live="polite" aria-atomic="true" class="slds-assistive-text">{liveAnnouncement}</div>
        <lightning-tabset variant="scoped" active-tab-value={activeMainTab}>
            <lightning-tab label="Create New" value="new_template" onactive={handleWizardTabActive}>
                <div class="slds-var-p-around_large">
                    <div class="wizard-header">
                        <lightning-progress-indicator current-step={currentWizardStep} type="base" variant="base">
                            <lightning-progress-step label="Name Your Template" value="1"></lightning-progress-step>
                            <lightning-progress-step label="Pick Your Data" value="2"></lightning-progress-step>
                            <lightning-progress-step label="Review &amp; Create" value="3"></lightning-progress-step>
                        </lightning-progress-indicator>
                    </div>

                    <div class="wizard-content">
                        <!-- Step 1: Details + Data Source Selection -->
                        <template if:true={isStep1}>
                            <!-- HTML-first authoring path picker -->
                            <div
                                class="dg-authoring-cards slds-var-m-bottom_large"
                                role="radiogroup"
                                aria-label="How do you want to build this template?"
                            >
                                <template for:each={authoringCards} for:item="card">
                                    <div
                                        key={card.mode}
                                        class={card.cardClass}
                                        data-mode={card.mode}
                                        onclick={handleAuthoringModeSelect}
                                        onkeydown={handleAuthoringModeKeydown}
                                        role="radio"
                                        aria-checked={card.selected}
                                        tabindex="0"
                                    >
                                        <div class="dg-authoring-card-head">
                                            <lightning-icon icon-name={card.icon} size="small"></lightning-icon>
                                            <span class="dg-authoring-card-title">{card.title}</span>
                                            <template if:true={card.badge}>
                                                <span class="dg-authoring-badge">{card.badge}</span>
                                            </template>
                                        </div>
                                        <p class="dg-authoring-card-desc">{card.desc}</p>
                                    </div>
                                </template>
                            </div>
                            <div class="slds-grid slds-gutters_large">
                                <div class="slds-col slds-size_1-of-2">
                                    <lightning-input
                                        label="Template Name"
                                        value={newTemplateName}
                                        onchange={handleNameChange}
                                        required
                                    ></lightning-input>
                                    <lightning-input
                                        label="API Name"
                                        value={newTemplateApiName}
                                        onchange={handleNewApiNameChange}
                                        max-length="80"
                                        pattern="[a-zA-Z][a-zA-Z0-9_]*"
                                        message-when-pattern-mismatch="Letters, numbers, and underscores only; must start with a letter."
                                        field-level-help="Stable key for referencing this template from Flows and DocGen Buttons (Template API Name input). Auto-fills from the name; survives sandbox-to-production deploys, unlike the record Id. Must be unique. Clear it to re-sync with the name."
                                        class="slds-var-m-top_medium"
                                    ></lightning-input>
                                    <lightning-input
                                        label="Category"
                                        value={newTemplateCategory}
                                        onchange={handleCategoryChange}
                                        class="slds-var-m-top_medium"
                                    ></lightning-input>

                                    <!-- Data Source: Salesforce Record vs Apex Class -->
                                    <lightning-radio-group
                                        class="slds-var-m-top_medium"
                                        label="Data Source"
                                        name="dataSourceMode"
                                        options={dataSourceModeOptions}
                                        value={dataSourceMode}
                                        onchange={handleDataSourceModeChange}
                                        type="radio"
                                        required
                                    >
                                    </lightning-radio-group>

                                    <!-- Salesforce Record path: Base Object picker -->
                                    <template if:true={isRecordDataSource}>
                                        <div style="position: relative" class="slds-var-m-top_medium">
                                            <lightning-input
                                                label="Base Object"
                                                value={newTemplateObject}
                                                onchange={handleObjectSearchInput}
                                                placeholder="Account, Opportunity, Contact..."
                                                required
                                                autocomplete="off"
                                            >
                                            </lightning-input>
                                            <template if:true={showObjectSuggestions}>
                                                <ul role="listbox" class="slds-is-absolute dg-suggestion-dropdown">
                                                    <template for:each={filteredObjectOptions} for:item="obj">
                                                        <li
                                                            key={obj.value}
                                                            class="slash-item"
                                                            role="option"
                                                            style="
                                                                cursor: pointer;
                                                                padding: 8px 12px;
                                                                display: flex;
                                                                align-items: center;
                                                                gap: 8px;
                                                                border-bottom: 1px solid #f3f2f2;
                                                            "
                                                            data-value={obj.value}
                                                            onclick={handleObjectSuggestionClick}
                                                        >
                                                            <span style="font-weight: 600">{obj.label}</span>
                                                            <span
                                                                style="
                                                                    font-family: monospace;
                                                                    font-size: 0.8rem;
                                                                    color: #7c3aed;
                                                                "
                                                                >{obj.value}</span
                                                            >
                                                            <template if:true={obj.isStandard}>
                                                                <span
                                                                    style="
                                                                        margin-left: auto;
                                                                        font-size: 0.7rem;
                                                                        font-weight: 600;
                                                                        color: #fff;
                                                                        background: #16a085;
                                                                        padding: 2px 8px;
                                                                        border-radius: 10px;
                                                                        white-space: nowrap;
                                                                    "
                                                                    >Standard</span
                                                                >
                                                            </template>
                                                        </li>
                                                    </template>
                                                </ul>
                                            </template>
                                        </div>
                                    </template>

                                    <!-- JSON Data (from Flow) path: nothing to configure here.
                                         The template receives its data at runtime from a Flow that
                                         supplies DocGenFlowAction.jsonData — no Base Object, no SOQL,
                                         no merge-field picker required. -->
                                    <template if:true={isFlowDataSource}>
                                        <div
                                            class="slds-box slds-theme_default slds-var-m-top_medium"
                                            style="border-radius: 8px"
                                        >
                                            <p class="slds-text-body_small">
                                                <lightning-icon
                                                    icon-name="utility:flow"
                                                    size="x-small"
                                                    class="slds-var-m-right_x-small"
                                                ></lightning-icon>
                                                This template receives its data from a Flow at runtime via
                                                <code>DocGenFlowAction.jsonData</code>. No Base Object or SOQL config
                                                needed — build the JSON payload in your Flow before invoking Generate
                                                Document. Next step: upload the template document.
                                            </p>
                                        </div>
                                    </template>

                                    <!-- Apex Data Provider path: class picker right here on Step 1 -->
                                    <template if:true={isApexDataSource}>
                                        <div class="slds-var-m-top_medium">
                                            <template if:false={isProviderConnected}>
                                                <div style="position: relative">
                                                    <lightning-input
                                                        type="search"
                                                        label="Data Provider Class"
                                                        placeholder="Search Apex classes implementing DocGenDataProvider..."
                                                        value={providerSearchTerm}
                                                        onchange={handleApexProviderSearch}
                                                        required
                                                    >
                                                    </lightning-input>
                                                    <template if:true={showProviderPicker}>
                                                        <div
                                                            class="slds-dropdown slds-dropdown_length-5 slds-dropdown_fluid slds-is-absolute dg-provider-dropdown"
                                                        >
                                                            <ul class="slds-listbox slds-listbox_vertical">
                                                                <template if:true={providerOptions.length}>
                                                                    <template for:each={providerOptions} for:item="cls">
                                                                        <li key={cls} class="slds-listbox__item">
                                                                            <div
                                                                                class="slds-media slds-listbox__option slds-listbox__option_plain slds-media_small"
                                                                                data-value={cls}
                                                                                onclick={handleApexProviderSelect}
                                                                            >
                                                                                <span class="slds-truncate"
                                                                                    ><lightning-icon
                                                                                        icon-name="utility:apex"
                                                                                        size="x-small"
                                                                                        class="slds-var-m-right_x-small"
                                                                                    ></lightning-icon
                                                                                    >{cls}</span
                                                                                >
                                                                            </div>
                                                                        </li>
                                                                    </template>
                                                                </template>
                                                                <template if:false={providerOptions.length}>
                                                                    <li class="slds-listbox__item">
                                                                        <div
                                                                            class="slds-media slds-listbox__option slds-listbox__option_plain slds-media_small"
                                                                        >
                                                                            <span class="slds-text-color_weak"
                                                                                >No classes implementing
                                                                                DocGenDataProvider found</span
                                                                            >
                                                                        </div>
                                                                    </li>
                                                                </template>
                                                            </ul>
                                                        </div>
                                                    </template>
                                                </div>
                                                <p
                                                    class="slds-text-body_small slds-text-color_weak slds-var-m-top_x-small"
                                                >
                                                    Implement <code>portwoodglobal.DocGenDataProvider</code> in your
                                                    org's Apex code to supply merge data from any source (callouts,
                                                    computed values, cross-object aggregations).
                                                </p>
                                                <template if:true={isValidatingProvider}>
                                                    <div
                                                        class="slds-var-m-top_small slds-is-relative"
                                                        style="height: 30px"
                                                    >
                                                        <lightning-spinner
                                                            alternative-text="Validating..."
                                                            size="small"
                                                        ></lightning-spinner>
                                                    </div>
                                                </template>
                                            </template>
                                            <template if:true={isProviderConnected}>
                                                <div class="slds-box slds-theme_default" style="border-radius: 8px">
                                                    <div
                                                        style="
                                                            display: flex;
                                                            align-items: center;
                                                            justify-content: space-between;
                                                        "
                                                    >
                                                        <div style="display: flex; align-items: center; gap: 8px">
                                                            <lightning-icon
                                                                icon-name="utility:apex"
                                                                size="x-small"
                                                            ></lightning-icon>
                                                            <span style="font-weight: 700"
                                                                >{selectedProviderClassName}</span
                                                            >
                                                            <span class="slds-badge slds-badge_lightest"
                                                                >{providerFields.length} fields</span
                                                            >
                                                        </div>
                                                        <lightning-button
                                                            label="Change class"
                                                            variant="base"
                                                            icon-name="utility:close"
                                                            onclick={handleClearApexProvider}
                                                        >
                                                        </lightning-button>
                                                    </div>
                                                    <div class="slds-var-m-top_small">
                                                        <lightning-input
                                                            label="Base Object (optional)"
                                                            value={apexProviderBaseObject}
                                                            onchange={handleApexProviderBaseObjectChange}
                                                            placeholder="Account, Opportunity, Custom_Object__c"
                                                            field-level-help="Leave blank for record-agnostic providers. Set an SObject API name when this provider returns data about a specific record type — needed for cross-object aggregation and record-context filtering."
                                                            autocomplete="off"
                                                        >
                                                        </lightning-input>
                                                    </div>
                                                </div>
                                            </template>
                                        </div>
                                    </template>
                                </div>
                                <div class="slds-col slds-size_1-of-2">
                                    <!-- Starter path: design gallery -->
                                    <template if:true={isAuthoringStarter}>
                                        <label class="slds-form-element__label">Starter Design</label>
                                        <div role="radiogroup" aria-label="Starter design">
                                            <template for:each={starterCards} for:item="starter">
                                                <div
                                                    key={starter.key}
                                                    class={starter.cardClass}
                                                    data-key={starter.key}
                                                    onclick={handleStarterSelect}
                                                    role="radio"
                                                    aria-checked={starter.selected}
                                                    tabindex="0"
                                                >
                                                    <div class="dg-starter-card-head">
                                                        <lightning-icon
                                                            icon-name={starter.icon}
                                                            size="x-small"
                                                        ></lightning-icon>
                                                        <span class="dg-starter-card-title">{starter.label}</span>
                                                    </div>
                                                    <p class="dg-starter-card-desc">{starter.description}</p>
                                                </div>
                                            </template>
                                        </div>
                                        <p class="slds-text-body_small slds-text-color_weak slds-var-m-top_x-small">
                                            Your Query Config fields are merged into the design automatically — pick
                                            data in the next step, review the HTML, done.
                                        </p>
                                    </template>

                                    <!-- AI path: explain the prompt handoff -->
                                    <template if:true={isAuthoringAi}>
                                        <div class="slds-box slds-theme_shade" style="border-radius: 8px" role="note">
                                            <p class="slds-text-body_small">
                                                <lightning-icon
                                                    icon-name="utility:einstein"
                                                    size="x-small"
                                                    class="slds-var-m-right_x-small"
                                                ></lightning-icon>
                                                After you pick your data in the next step, the
                                                <strong>Review</strong> screen shows a complete prompt — your fields,
                                                DocGen's merge-tag syntax, and the PDF engine's layout rules. Copy it
                                                into Claude, ChatGPT, Gemini, or Copilot, then paste the returned HTML
                                                into the template editor. No data leaves Salesforce unless you paste it.
                                            </p>
                                        </div>
                                    </template>

                                    <!-- File path: classic Type/Output Format pickers -->
                                    <template if:true={isAuthoringFile}>
                                        <lightning-combobox
                                            label="Type"
                                            value={newTemplateType}
                                            options={typeOptions}
                                            onchange={handleTypeChange}
                                            field-level-help="What kind of source file you'll upload. HTML is the most reliable for PDF output; Word/PowerPoint/Excel keep their native format or convert to PDF."
                                            required
                                        ></lightning-combobox>
                                        <template if:true={showWordConversionNote}>
                                            <div
                                                class="slds-box slds-box_x-small slds-theme_warning slds-var-m-top_x-small"
                                                role="note"
                                            >
                                                <p class="slds-text-body_small">
                                                    <lightning-icon
                                                        icon-name="utility:info"
                                                        size="x-small"
                                                        class="slds-var-m-right_x-small"
                                                    ></lightning-icon>
                                                    Word templates are converted to HTML for PDF output — complex
                                                    layouts (text boxes, floating images, unusual tables) may not
                                                    convert exactly. Keep Output Format&nbsp;<strong
                                                        >Native (.docx)</strong
                                                    >&nbsp;for full fidelity, or use&nbsp;<strong
                                                        >Start from a Design</strong
                                                    >&nbsp;/&nbsp;<strong>Generate with AI</strong>&nbsp;for
                                                    pixel-perfect PDFs.
                                                </p>
                                            </div>
                                        </template>
                                        <lightning-combobox
                                            label="Output Format"
                                            value={newTemplateOutputFormat}
                                            options={outputFormatOptions}
                                            onchange={handleOutputFormatChange}
                                            class="slds-var-m-top_medium"
                                            required
                                        ></lightning-combobox>
                                    </template>
                                    <template if:true={showNewPageLayoutFields}>
                                        <lightning-combobox
                                            label="Page Orientation"
                                            value={newTemplatePageOrientation}
                                            options={pageOrientationOptions}
                                            onchange={handleNewPageOrientationChange}
                                            class="slds-var-m-top_medium"
                                            field-level-help="Portrait or Landscape — applies to PDF output."
                                        ></lightning-combobox>
                                        <lightning-combobox
                                            label="Page Size"
                                            value={newTemplatePageSize}
                                            options={pageSizeOptions}
                                            onchange={handleNewPageSizeChange}
                                            class="slds-var-m-top_medium"
                                            field-level-help="Letter (US default), Legal, or A4 (international)."
                                        ></lightning-combobox>
                                        <lightning-combobox
                                            label="Page Margins"
                                            value={newTemplatePageMargins}
                                            options={pageMarginsOptions}
                                            onchange={handleNewPageMarginsChange}
                                            class="slds-var-m-top_medium"
                                            field-level-help="Default uses 1in portrait / 0.5in landscape. Pick a preset or Custom."
                                        ></lightning-combobox>
                                        <template if:true={showNewCustomMargins}>
                                            <lightning-input
                                                label="Custom Margins (in)"
                                                value={newTemplateCustomMargins}
                                                onchange={handleNewCustomMarginsChange}
                                                class="slds-var-m-top_medium"
                                                placeholder="0.75 or 0.5,0.75,0.5,0.75"
                                                field-level-help="One value applies to all sides; four values are Top,Right,Bottom,Left in inches. Range 0.1–3.0."
                                            ></lightning-input>
                                        </template>
                                    </template>
                                    <template if:true={showHtmlPageRuleNote}>
                                        <div class="slds-box slds-theme_shade slds-var-m-top_medium" role="status">
                                            <p class="slds-text-body_small">
                                                <lightning-icon
                                                    icon-name="utility:info"
                                                    size="x-small"
                                                    class="slds-var-m-right_x-small"
                                                ></lightning-icon>
                                                Page layout for HTML templates comes from your
                                                <code>@page</code> CSS rule. Upload your HTML in the next step — if it
                                                doesn't declare <code>@page</code>, you can set Letter/A4/Margins in the
                                                template editor.
                                            </p>
                                        </div>
                                    </template>
                                    <template if:true={isRecordDataSource}>
                                        <template if:true={newTemplateObject}>
                                            <div class="slds-var-m-top_medium">
                                                <lightning-record-picker
                                                    label="Sample Record (optional)"
                                                    object-api-name={newTemplateObject}
                                                    value={newTemplateSampleRecordId}
                                                    onchange={handleSampleRecordChange}
                                                    placeholder="Pick a record to preview data..."
                                                >
                                                </lightning-record-picker>
                                                <p
                                                    class="slds-text-body_small slds-text-color_weak slds-var-m-top_xx-small"
                                                >
                                                    See real data from this record while building your query.
                                                </p>
                                            </div>
                                        </template>
                                    </template>
                                    <template if:true={isApexDataSource}>
                                        <div
                                            class="slds-var-m-top_medium slds-text-body_small slds-text-color_weak"
                                            style="font-style: italic"
                                        >
                                            Sample records aren't applicable for Apex Data Providers — the class
                                            supplies its own data shape at render time.
                                        </div>
                                    </template>
                                </div>
                            </div>
                        </template>

                        <!-- Step 2: Query -->
                        <template if:true={isStep2}>
                            <div
                                style="
                                    margin-bottom: 12px;
                                    display: flex;
                                    align-items: center;
                                    justify-content: space-between;
                                "
                            >
                                <div style="display: flex; align-items: center; gap: 8px">
                                    <lightning-icon icon-name="standard:account" size="x-small"></lightning-icon>
                                    <span style="font-weight: 700">{newTemplateObject}</span>
                                </div>
                                <div style="display: flex; align-items: center; gap: 16px">
                                    <template if:false={useApexProvider}>
                                        <a
                                            href="javascript:void(0)"
                                            onclick={toggleVisualBuilder}
                                            style="
                                                font-size: 0.82rem;
                                                color: #7c3aed;
                                                text-decoration: none;
                                                display: flex;
                                                align-items: center;
                                                gap: 4px;
                                            "
                                        >
                                            <lightning-icon
                                                icon-name={visualBuilderToggleIcon}
                                                size="xx-small"
                                                style="--sds-c-icon-color-foreground-default: #7c3aed"
                                            ></lightning-icon>
                                            <template if:false={useVisualBuilder}>Try our visual builder</template>
                                            <template if:true={useVisualBuilder}>Switch to manual query</template>
                                        </a>
                                    </template>
                                    <a
                                        href="javascript:void(0)"
                                        onclick={toggleApexProvider}
                                        style="
                                            font-size: 0.82rem;
                                            color: #7c3aed;
                                            text-decoration: none;
                                            display: flex;
                                            align-items: center;
                                            gap: 4px;
                                        "
                                    >
                                        <lightning-icon
                                            icon-name="utility:apex"
                                            size="xx-small"
                                            style="--sds-c-icon-color-foreground-default: #7c3aed"
                                        ></lightning-icon>
                                        {apexProviderToggleLabel}
                                    </a>
                                </div>
                            </div>

                            <!-- Apex Data Provider mode (V4) -->
                            <template if:true={useApexProvider}>
                                <div class="slds-box slds-theme_default" style="border-radius: 8px">
                                    <p class="slds-text-body_small slds-text-color_weak slds-var-m-bottom_small">
                                        Bind this template to an Apex class implementing
                                        <code>portwoodglobal.DocGenDataProvider</code>. The class supplies merge data at
                                        render time — no SOQL config needed.
                                    </p>
                                    <template if:false={isProviderConnected}>
                                        <div style="position: relative">
                                            <lightning-input
                                                type="search"
                                                label="Search for a Data Provider class"
                                                placeholder="Type at least 2 characters..."
                                                value={providerSearchTerm}
                                                onchange={handleApexProviderSearch}
                                            >
                                            </lightning-input>
                                            <template if:true={showProviderPicker}>
                                                <div
                                                    class="slds-dropdown slds-dropdown_length-5 slds-dropdown_fluid slds-is-absolute dg-provider-dropdown"
                                                >
                                                    <ul class="slds-listbox slds-listbox_vertical">
                                                        <template if:true={providerOptions.length}>
                                                            <template for:each={providerOptions} for:item="cls">
                                                                <li key={cls} class="slds-listbox__item">
                                                                    <div
                                                                        class="slds-media slds-listbox__option slds-listbox__option_plain slds-media_small"
                                                                        data-value={cls}
                                                                        onclick={handleApexProviderSelect}
                                                                    >
                                                                        <span class="slds-truncate"
                                                                            ><lightning-icon
                                                                                icon-name="utility:apex"
                                                                                size="x-small"
                                                                                class="slds-var-m-right_x-small"
                                                                            ></lightning-icon
                                                                            >{cls}</span
                                                                        >
                                                                    </div>
                                                                </li>
                                                            </template>
                                                        </template>
                                                        <template if:false={providerOptions.length}>
                                                            <li class="slds-listbox__item">
                                                                <div
                                                                    class="slds-media slds-listbox__option slds-listbox__option_plain slds-media_small"
                                                                >
                                                                    <span class="slds-text-color_weak"
                                                                        >No classes implementing DocGenDataProvider
                                                                        found</span
                                                                    >
                                                                </div>
                                                            </li>
                                                        </template>
                                                    </ul>
                                                </div>
                                            </template>
                                        </div>
                                        <template if:true={isValidatingProvider}>
                                            <div class="slds-var-m-top_small slds-is-relative" style="height: 30px">
                                                <lightning-spinner
                                                    alternative-text="Validating..."
                                                    size="small"
                                                ></lightning-spinner>
                                            </div>
                                        </template>
                                    </template>

                                    <template if:true={isProviderConnected}>
                                        <div
                                            style="
                                                display: flex;
                                                align-items: center;
                                                justify-content: space-between;
                                                margin-bottom: 8px;
                                            "
                                        >
                                            <div style="display: flex; align-items: center; gap: 8px">
                                                <lightning-icon
                                                    icon-name="utility:apex"
                                                    size="x-small"
                                                ></lightning-icon>
                                                <span style="font-weight: 700">{selectedProviderClassName}</span>
                                                <span class="slds-badge slds-badge_lightest"
                                                    >{providerFields.length} fields</span
                                                >
                                            </div>
                                            <lightning-button
                                                label="Change class"
                                                variant="base"
                                                icon-name="utility:close"
                                                onclick={handleClearApexProvider}
                                            >
                                            </lightning-button>
                                        </div>
                                        <p class="slds-text-body_small slds-text-color_weak">
                                            Available merge tags from this provider:
                                        </p>
                                        <div style="display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px">
                                            <template for:each={providerTagPills} for:item="p">
                                                <span
                                                    key={p.raw}
                                                    style="
                                                        background: #f3e8ff;
                                                        border: 1px solid #d8c4f0;
                                                        color: #7c3aed;
                                                        padding: 2px 8px;
                                                        border-radius: 4px;
                                                        font-size: 0.78rem;
                                                        font-family: monospace;
                                                    "
                                                    >{p.tag}</span
                                                >
                                            </template>
                                        </div>
                                    </template>
                                </div>
                            </template>

                            <!-- Visual Builder -->
                            <template if:true={useVisualBuilder}>
                                <c-doc-gen-tree-builder
                                    selected-object={newTemplateObject}
                                    query-config={newTemplateQuery}
                                    onconfigchange={handleConfigChange}
                                >
                                </c-doc-gen-tree-builder>
                            </template>

                            <!-- Manual Query Textarea (hidden when visual builder OR Apex provider is active) -->
                            <template if:false={useVisualBuilder}>
                                <template if:false={useApexProvider}>
                                    <div style="position: relative">
                                        <textarea
                                            class="slds-textarea wizard-query-textarea"
                                            value={newTemplateQuery}
                                            oninput={handleDirectQueryEdit}
                                            onkeydown={handleQueryKeyDown}
                                            placeholder="Paste a SOQL query or type field names — suggestions will appear.&#10;&#10;Examples:&#10;  SELECT Name, Industry, (SELECT FirstName FROM Contacts) FROM Account&#10;  Name, Industry, Phone&#10;  Owner.Name, CreatedBy.Email&#10;  (SELECT FirstName, LastName FROM Contacts)"
                                            style="
                                                width: 100%;
                                                min-height: 240px;
                                                font-family: 'SF Mono', Monaco, Consolas, monospace;
                                                font-size: 0.9rem;
                                                line-height: 1.8;
                                                padding: 14px;
                                                border: 1px solid #d8dde6;
                                                border-radius: 8px;
                                                resize: vertical;
                                            "
                                        >
                                        </textarea>
                                        <template if:true={showSuggestions}>
                                            <div
                                                class="slds-is-absolute dg-merge-suggestions"
                                                onmousedown={handleSuggestionMouseDown}
                                            >
                                                <template for:each={suggestions} for:item="s">
                                                    <div
                                                        key={s.value}
                                                        class="slash-item"
                                                        data-value={s.value}
                                                        onclick={handleSuggestionClick}
                                                        style="
                                                            padding: 6px 12px;
                                                            cursor: pointer;
                                                            display: flex;
                                                            align-items: baseline;
                                                            gap: 8px;
                                                        "
                                                    >
                                                        <span
                                                            style="
                                                                font-family: monospace;
                                                                font-size: 0.85rem;
                                                                color: #7c3aed;
                                                                font-weight: 600;
                                                            "
                                                            >{s.value}</span
                                                        >
                                                        <span style="font-size: 0.78rem; color: #706e6b"
                                                            >{s.label}</span
                                                        >
                                                        <template if:true={s.extra}>
                                                            <span
                                                                style="
                                                                    font-size: 0.68rem;
                                                                    color: #999;
                                                                    margin-left: auto;
                                                                "
                                                                >{s.extra}</span
                                                            >
                                                        </template>
                                                    </div>
                                                </template>
                                            </div>
                                        </template>
                                    </div>
                                </template>
                            </template>
                            <template if:false={useApexProvider}>
                                <template if:true={queryWarnings}>
                                    <template for:each={queryWarnings} for:item="warn">
                                        <div
                                            key={warn}
                                            style="
                                                margin-top: 8px;
                                                padding: 8px 12px;
                                                background: #fff8e1;
                                                border: 1px solid #f9a825;
                                                border-radius: 6px;
                                                font-size: 0.8rem;
                                                color: #5d4037;
                                                display: flex;
                                                align-items: center;
                                                gap: 6px;
                                            "
                                        >
                                            <lightning-icon
                                                icon-name="utility:warning"
                                                size="xx-small"
                                                variant="warning"
                                            ></lightning-icon>
                                            {warn}
                                        </div>
                                    </template>
                                </template>
                            </template>
                            <template if:false={useApexProvider}>
                                <template if:true={queryTreeNodes.length}>
                                    <div
                                        style="
                                            margin-top: 12px;
                                            border: 1px solid #e5e5e5;
                                            border-radius: 8px;
                                            padding: 10px 14px;
                                            background: #fafaf9;
                                        "
                                    >
                                        <template for:each={queryTreeNodes} for:item="node">
                                            <div key={node.id}>
                                                <div
                                                    style="
                                                        display: flex;
                                                        align-items: center;
                                                        gap: 4px;
                                                        margin-bottom: 6px;
                                                    "
                                                >
                                                    <lightning-icon
                                                        icon-name="standard:account"
                                                        size="xx-small"
                                                    ></lightning-icon>
                                                    <span style="font-weight: 700; font-size: 0.85rem"
                                                        >{node.label}</span
                                                    >
                                                </div>
                                                <!-- Fields with sample values -->
                                                <template if:true={node.hasFields}>
                                                    <div
                                                        style="
                                                            margin-left: 22px;
                                                            display: flex;
                                                            flex-wrap: wrap;
                                                            gap: 4px;
                                                            margin-bottom: 6px;
                                                        "
                                                    >
                                                        <template for:each={node.fieldPills} for:item="fp">
                                                            <span
                                                                key={fp.key}
                                                                style="
                                                                    background: #eef4ff;
                                                                    border: 1px solid #c7d7f5;
                                                                    padding: 2px 8px;
                                                                    border-radius: 4px;
                                                                    font-size: 0.75rem;
                                                                    font-family: monospace;
                                                                    display: inline-flex;
                                                                    align-items: baseline;
                                                                    gap: 4px;
                                                                "
                                                            >
                                                                <span style="color: #1a56db">{fp.name}</span>
                                                                <template if:true={fp.sample}>
                                                                    <span
                                                                        style="
                                                                            color: #555;
                                                                            font-family: -apple-system, sans-serif;
                                                                            font-weight: 400;
                                                                        "
                                                                        >= {fp.sample}</span
                                                                    >
                                                                </template>
                                                            </span>
                                                        </template>
                                                    </div>
                                                </template>
                                                <!-- Parent fields with sample values -->
                                                <template if:true={node.hasParentFields}>
                                                    <div
                                                        style="
                                                            margin-left: 22px;
                                                            display: flex;
                                                            flex-wrap: wrap;
                                                            gap: 4px;
                                                            margin-bottom: 6px;
                                                        "
                                                    >
                                                        <template for:each={node.parentPills} for:item="pp">
                                                            <span
                                                                key={pp.key}
                                                                style="
                                                                    background: #f3e8ff;
                                                                    border: 1px solid #d8c4f0;
                                                                    padding: 2px 8px;
                                                                    border-radius: 4px;
                                                                    font-size: 0.75rem;
                                                                    font-family: monospace;
                                                                    display: inline-flex;
                                                                    align-items: baseline;
                                                                    gap: 4px;
                                                                "
                                                            >
                                                                <span style="color: #7c3aed">{pp.name}</span>
                                                                <template if:true={pp.sample}>
                                                                    <span
                                                                        style="
                                                                            color: #555;
                                                                            font-family: -apple-system, sans-serif;
                                                                            font-weight: 400;
                                                                        "
                                                                        >= {pp.sample}</span
                                                                    >
                                                                </template>
                                                            </span>
                                                        </template>
                                                    </div>
                                                </template>
                                                <!-- Child relationships (flattened for any depth) -->
                                                <template if:true={node.hasFlatChildren}>
                                                    <div style="margin-left: 22px">
                                                        <template for:each={node.flatChildren} for:item="child">
                                                            <div key={child.id} style={child.indentStyle}>
                                                                <div
                                                                    style="
                                                                        display: flex;
                                                                        align-items: center;
                                                                        gap: 4px;
                                                                        margin-bottom: 4px;
                                                                    "
                                                                >
                                                                    <lightning-icon
                                                                        icon-name="standard:related_list"
                                                                        size="xx-small"
                                                                    ></lightning-icon>
                                                                    <span style="font-weight: 600; font-size: 0.82rem"
                                                                        >{child.label}</span
                                                                    >
                                                                    <span
                                                                        style="
                                                                            font-size: 0.72rem;
                                                                            color: #706e6b;
                                                                            margin-left: 4px;
                                                                        "
                                                                        >({child.fieldCount} fields)</span
                                                                    >
                                                                </div>
                                                                <div
                                                                    style="
                                                                        margin-left: 20px;
                                                                        display: flex;
                                                                        flex-wrap: wrap;
                                                                        gap: 3px;
                                                                    "
                                                                >
                                                                    <template for:each={child.fields} for:item="cf">
                                                                        <span
                                                                            key={cf}
                                                                            style="
                                                                                background: #ecfdf5;
                                                                                color: #065f46;
                                                                                padding: 2px 8px;
                                                                                border-radius: 4px;
                                                                                font-size: 0.75rem;
                                                                                font-family: monospace;
                                                                            "
                                                                            >{cf}</span
                                                                        >
                                                                    </template>
                                                                    <template if:true={child.hasParentFields}>
                                                                        <template
                                                                            for:each={child.parentFields}
                                                                            for:item="pf"
                                                                        >
                                                                            <span
                                                                                key={pf}
                                                                                style="
                                                                                    background: #f3e8ff;
                                                                                    color: #7c3aed;
                                                                                    border: 1px solid #d8c4f0;
                                                                                    padding: 2px 8px;
                                                                                    border-radius: 4px;
                                                                                    font-size: 0.75rem;
                                                                                    font-family: monospace;
                                                                                "
                                                                                >{pf}</span
                                                                            >
                                                                        </template>
                                                                    </template>
                                                                </div>
                                                            </div>
                                                        </template>
                                                    </div>
                                                </template>
                                            </div>
                                        </template>
                                    </div>
                                </template>
                            </template>

                            <!-- Inline Help — SOQL reference (hidden when Apex Provider is the data source) -->
                            <template if:false={useApexProvider}>
                                <div
                                    style="
                                        margin-top: 14px;
                                        background: #f8fafc;
                                        border: 1px solid #e5e5e5;
                                        border-radius: 8px;
                                        padding: 12px 16px;
                                        font-size: 0.8rem;
                                        color: #444;
                                        line-height: 1.7;
                                    "
                                >
                                    <div style="font-weight: 700; color: #181818; margin-bottom: 6px">
                                        Quick Reference
                                    </div>
                                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 4px 24px">
                                        <div>
                                            <strong>Fields:</strong>
                                            <code style="background: #eee; padding: 1px 4px; border-radius: 3px"
                                                >Name, Industry, Phone</code
                                            >
                                        </div>
                                        <div>
                                            <strong>Parent lookup:</strong>
                                            <code style="background: #eee; padding: 1px 4px; border-radius: 3px"
                                                >Owner.Name, Account.Industry</code
                                            >
                                        </div>
                                        <div>
                                            <strong>Related list:</strong>
                                            <code style="background: #eee; padding: 1px 4px; border-radius: 3px"
                                                >(SELECT FirstName FROM Contacts)</code
                                            >
                                        </div>
                                        <div>
                                            <strong>With filter:</strong>
                                            <code style="background: #eee; padding: 1px 4px; border-radius: 3px"
                                                >(SELECT Name FROM Opps WHERE StageName = 'Closed Won')</code
                                            >
                                        </div>
                                        <div>
                                            <strong>With sort:</strong>
                                            <code style="background: #eee; padding: 1px 4px; border-radius: 3px"
                                                >(SELECT Name FROM Contacts ORDER BY LastName)</code
                                            >
                                        </div>
                                        <div>
                                            <strong>With limit:</strong>
                                            <code style="background: #eee; padding: 1px 4px; border-radius: 3px"
                                                >(SELECT Name FROM Cases LIMIT 10)</code
                                            >
                                        </div>
                                    </div>
                                </div>
                            </template>
                        </template>

                        <!-- Step 3: Review & Create -->
                        <template if:true={isStep3}>
                            <div class="slds-box slds-theme_shade" style="border-radius: 8px">
                                <h3 class="slds-text-heading_medium slds-var-m-bottom_medium">Review Template</h3>
                                <p class="slds-var-m-bottom_small"><strong>Name:</strong> {newTemplateName}</p>
                                <template if:true={newTemplateApiName}>
                                    <p class="slds-var-m-bottom_small">
                                        <strong>API Name:</strong> <code>{newTemplateApiName}</code>
                                    </p>
                                </template>
                                <template if:true={isFlowDataSource}>
                                    <p class="slds-var-m-bottom_small">
                                        <strong>Data Source:</strong> JSON Data (from Flow)
                                    </p>
                                    <p class="slds-var-m-bottom_small slds-text-body_small slds-text-color_weak">
                                        Data is supplied at runtime via
                                        <code>DocGenFlowAction.jsonData</code>. No SOQL or Apex Provider class is bound
                                        to this template.
                                    </p>
                                </template>
                                <template if:false={isFlowDataSource}>
                                    <p class="slds-var-m-bottom_small"><strong>Object:</strong> {newTemplateObject}</p>
                                    <p class="slds-var-m-bottom_small"><strong>Query:</strong></p>
                                    <pre
                                        style="
                                            font-size: 0.8125rem;
                                            background: #f3f2f2;
                                            padding: 0.75rem;
                                            border-radius: 6px;
                                            white-space: pre-wrap;
                                            margin: 0 0 0.5rem 0;
                                        "
                                    >
{readableQueryConfig}</pre
                                    >
                                </template>
                                <template if:true={isAuthoringStarter}>
                                    <p class="slds-var-m-bottom_small">
                                        <strong>Starter design:</strong> {selectedStarterLabel} — a ready-to-render HTML
                                        body with your merge fields is attached on create. Review it in the editor, then
                                        click "Save as New Version" to activate v1.
                                    </p>
                                </template>
                                <template if:true={isAuthoringAi}>
                                    <div class="slds-var-m-top_medium">
                                        <div
                                            style="
                                                display: flex;
                                                align-items: center;
                                                justify-content: space-between;
                                                margin-bottom: 6px;
                                            "
                                        >
                                            <strong
                                                >Your AI prompt — copy this into Claude, ChatGPT, Gemini, or
                                                Copilot</strong
                                            >
                                            <lightning-button
                                                label="Copy Prompt"
                                                icon-name="utility:copy"
                                                variant="brand"
                                                onclick={handleCopyAiPrompt}
                                            ></lightning-button>
                                        </div>
                                        <pre class="dg-ai-prompt">{aiAuthoringPrompt}</pre>
                                        <p class="slds-text-body_small slds-text-color_weak slds-var-m-top_x-small">
                                            Paste the HTML your assistant returns into the template's&nbsp;<strong
                                                >Edit HTML</strong
                                            >&nbsp;editor (it opens after Create). The prompt stays available there too.
                                        </p>
                                    </div>
                                </template>
                                <p class="slds-var-m-top_large">Click "Create Template" to save.</p>
                            </div>
                        </template>
                    </div>

                    <!-- Footer Navigation -->
                    <div class="wizard-footer">
                        <div class="slds-float_right">
                            <lightning-button
                                label="Back"
