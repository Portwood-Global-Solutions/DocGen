                                            value={editTemplatePageOrientation}
                                            options={pageOrientationOptions}
                                            onchange={handleEditPageOrientationChange}
                                            class="slds-var-m-top_medium"
                                            field-level-help="Portrait or Landscape — applies to PDF output."
                                        ></lightning-combobox>
                                        <lightning-combobox
                                            label="Page Size"
                                            value={editTemplatePageSize}
                                            options={pageSizeOptions}
                                            onchange={handleEditPageSizeChange}
                                            class="slds-var-m-top_medium"
                                            field-level-help="Letter (US default), Legal, or A4 (international)."
                                        ></lightning-combobox>
                                        <lightning-combobox
                                            label="Page Margins"
                                            value={editTemplatePageMargins}
                                            options={pageMarginsOptions}
                                            onchange={handleEditPageMarginsChange}
                                            class="slds-var-m-top_medium"
                                            field-level-help="Default uses 1in portrait / 0.5in landscape. Pick a preset or Custom."
                                        ></lightning-combobox>
                                        <template if:true={showEditCustomMargins}>
                                            <lightning-input
                                                label="Custom Margins (in)"
                                                value={editTemplateCustomMargins}
                                                onchange={handleEditCustomMarginsChange}
                                                class="slds-var-m-top_medium"
                                                placeholder="0.75 or 0.5,0.75,0.5,0.75"
                                                field-level-help="One value applies to all sides; four values are Top,Right,Bottom,Left in inches. Range 0.1–3.0."
                                            ></lightning-input>
                                        </template>
                                    </template>
                                    <lightning-input
                                        label="Base Object API Name"
                                        value={editTemplateObject}
                                        readonly
                                        class="slds-var-m-top_medium"
                                    ></lightning-input>
                                    <lightning-input
                                        type="toggle"
                                        label="Active (visible in the document picker)"
                                        checked={editTemplateIsActive}
                                        onchange={handleEditActiveChange}
                                        class="slds-var-m-top_medium"
                                        message-toggle-active="Active"
                                        message-toggle-inactive="Inactive (hidden from picker, still editable here)"
                                    ></lightning-input>
                                    <lightning-input
                                        type="toggle"
                                        label="Default Template for this Object"
                                        checked={editTemplateIsDefault}
                                        onchange={handleEditDefaultChange}
                                        class="slds-var-m-top_medium"
                                        message-toggle-active="Yes"
                                        message-toggle-inactive="No"
                                    ></lightning-input>

                                    <c-doc-gen-title-editor
                                        value={editTemplateTitleFormat}
                                        query-config={editTemplateQuery}
                                        onchange={handleTitleFormatChange}
                                        class="slds-var-m-top_medium slds-show"
                                    >
                                    </c-doc-gen-title-editor>
                                </div>
                            </div>
                            <div class="slds-var-p-horizontal_small">
                                <lightning-textarea
                                    label="Description"
                                    value={editTemplateDesc}
                                    onchange={handleEditDescChange}
                                    class="slds-var-m-top_medium"
                                ></lightning-textarea>
                            </div>

                            <!-- 1.47 — Visibility & sort controls -->
                            <div class="slds-var-p-horizontal_small slds-var-m-top_large">
                                <h3 class="slds-text-heading_small slds-var-m-bottom_x-small">Visibility &amp; Sort</h3>
                                <p class="slds-text-body_small slds-text-color_weak slds-var-m-bottom_small">
                                    Control which records and which users see this template in the runner, signature
                                    sender, bulk picker, and Flow.
                                </p>
                                <div class="slds-grid slds-gutters_medium">
                                    <div class="slds-col slds-size_1-of-2">
                                        <lightning-input
                                            type="number"
                                            label="Sort Order"
                                            field-level-help="Lower numbers appear higher in the picker. Blank = sort by Default-first then Name."
                                            value={editTemplateSortOrder}
                                            onchange={handleEditSortOrderChange}
                                        >
                                        </lightning-input>
                                        <lightning-input
                                            type="toggle"
                                            label="Lock Output Format"
                                            field-level-help="When ON, the runner won't let users override the Output Format at runtime."
                                            checked={editTemplateLockOutputFormat}
                                            onchange={handleEditLockOutputChange}
                                            message-toggle-active="Locked"
                                            message-toggle-inactive="Unlocked"
                                            class="slds-var-m-top_medium"
                                        >
                                        </lightning-input>
                                    </div>
                                    <div class="slds-col slds-size_1-of-2">
                                        <lightning-textarea
                                            label="Specific Record Ids"
                                            field-level-help="Comma-separated 18-char record Ids (e.g. 001AB0000000001AAA, 001AB0000000002AAA). When set, the template only appears for those records. Blank = applies to ALL records of the Base Object."
                                            value={editTemplateSpecificRecordIds}
                                            onchange={handleEditSpecificRecordIdsChange}
                                        >
                                        </lightning-textarea>
                                        <lightning-textarea
                                            label="Required Permission Sets"
                                            field-level-help="Comma-separated permission set API names (e.g. DocGen_Executive_Templates, DocGen_Finance_Templates). Users need at least ONE assigned to see this template. Blank = visible to all DocGen users."
                                            value={editTemplateRequiredPermissionSets}
                                            onchange={handleEditRequiredPermSetsChange}
                                            class="slds-var-m-top_medium"
                                        >
                                        </lightning-textarea>
                                    </div>
                                </div>

                                <!-- 1.48 — Record Filter (SOQL WHERE clause) — power users -->
                                <div class="slds-var-m-top_medium">
                                    <lightning-textarea
                                        label="Record Filter (SOQL WHERE clause)"
                                        field-level-help="Advanced / power users. SOQL WHERE clause evaluated against the current record. Examples: Type = 'Customer'  |  Industry IN ('Technology','Media')  |  Annual_Revenue__c > 1000000 AND BillingCountry = 'US'. Wins over Specific Record Ids when both set. Blank = no filter."
                                        value={editTemplateRecordFilter}
                                        onchange={handleEditRecordFilterChange}
                                    >
                                    </lightning-textarea>
                                    <div class="slds-var-m-top_x-small">
                                        <lightning-button
                                            label="Test Against Sample Record"
                                            icon-name="utility:check"
                                            variant="neutral"
                                            onclick={handleTestRecordFilter}
                                            disabled={editTemplateRecordFilterTesting}
                                        >
                                        </lightning-button>
                                        <span class="slds-text-body_small slds-text-color_weak slds-var-m-left_small"
                                            >Tests the clause against the Sample Test Record Id on this template.</span
                                        >
                                    </div>
                                    <div class={recordFilterResultClass}>{editTemplateRecordFilterResultMessage}</div>
                                </div>
                            </div>
                        </lightning-tab>

                        <!-- Tab 1b: HTML Header / Footer (HTML type only) -->
                        <template if:true={isEditTypeHtml}>
                            <lightning-tab label="Header / Footer" value="headerFooter">
                                <div class="slds-var-p-around_small">
                                    <div
                                        class="slds-box slds-theme_shade slds-var-m-bottom_medium"
                                        style="font-size: 0.85rem"
                                    >
                                        Content placed in the page margins of every page. Supports merge tags including
                                        <code>&#123;PageNumber&#125;</code> and <code>&#123;TotalPages&#125;</code>.
                                        Leave blank to omit.
                                    </div>
                                    <div
                                        class="slds-var-m-top_small"
                                        style="display: flex; align-items: center; justify-content: space-between"
                                    >
                                        <label class="slds-form-element__label" style="font-weight: 600">Header</label>
                                        <lightning-button
                                            label={headerSourceToggleLabel}
                                            icon-name="utility:anywhere_chat"
                                            variant="base"
                                            onclick={toggleHeaderHtmlSource}
                                        >
                                        </lightning-button>
                                    </div>
                                    <template if:false={showHeaderHtmlSource}>
                                        <lightning-input-rich-text
                                            value={editTemplateHeaderHtml}
                                            onchange={handleEditHeaderHtmlChange}
                                            placeholder="e.g. &#123;Name&#125; — Page &#123;PageNumber&#125; of &#123;TotalPages&#125;"
                                            label-visible="false"
                                        >
                                        </lightning-input-rich-text>
                                    </template>
                                    <template if:true={showHeaderHtmlSource}>
                                        <lightning-textarea
                                            label="Header HTML source"
                                            variant="label-hidden"
                                            value={editTemplateHeaderHtml}
                                            onchange={handleEditHeaderHtmlChange}
                                            placeholder='<div style="text-align:right;"><img src="..." width="40"/> Page &#123;PageNumber&#125;</div>'
                                            class="docgen-html-source"
                                        >
                                        </lightning-textarea>
                                    </template>
                                    <div
                                        class="slds-var-m-top_large"
                                        style="display: flex; align-items: center; justify-content: space-between"
                                    >

                                                    padding: 4px;
                                                    background: #fff;

                                    </div>
                                </div>
                            </lightning-tab>
                        </template>

                        <!-- Tab 2: Query Configuration -->
                        <lightning-tab label="Query Configuration" value="query" onactive={handleQueryTabActive}>
                            <div class="slds-var-p-horizontal_small" style="padding-top: 8px">
                                <div
                                    style="
                                        margin-bottom: 12px;
                                        display: flex;
                                        align-items: center;
                                        justify-content: space-between;
                                    "
                                >
                                    <div style="display: flex; align-items: center; gap: 8px">
                                        <lightning-icon icon-name="standard:account" size="x-small"></lightning-icon>

                                    </div>
                                    <template if:false={isEditFlowDataSource}>
                                        <div style="display: flex; align-items: center; gap: 16px">
                                            <template if:false={editUseApexProvider}>

                                                    href="javascript:void(0)"
                                                    onclick={toggleEditVisualBuilder}

                                                        font-size: 0.82rem;
                                                        color: #7c3aed;
                                                        text-decoration: none;
                                                        display: flex;
                                                        align-items: center;
                                                        gap: 4px;
                                                    "
                                                >
                                                    <lightning-icon
                                                        icon-name={editVisualBuilderToggleIcon}
                                                        size="xx-small"
                                                        style="--sds-c-icon-color-foreground-default: #7c3aed"
                                                    ></lightning-icon>
                                                    <template if:false={editUseVisualBuilder}
                                                        >Try our visual builder</template
                                                    >
                                                    <template if:true={editUseVisualBuilder}
                                                        >Switch to manual query</template
                                                    >
                                                </a>
                                            </template>
                                            <a
                                                href="javascript:void(0)"
                                                onclick={toggleEditApexProvider}
                                                style="
                                                    font-size: 0.82rem;
                                                    color: #7c3aed;
                                                    text-decoration: none;
                                                    display: flex;
                                                    align-items: center;
                                                    gap: 4px;
                                                "
                                            >
                                                <lightning-icon
                                                    icon-name="utility:apex"
                                                    size="xx-small"
                                                    style="--sds-c-icon-color-foreground-default: #7c3aed"

                                                {editApexProviderToggleLabel}
                                            </a>
                                        </div>
                                    </template>
                                </div>

                                        <p class="slds-text-body_small">
                                            <lightning-icon
                                                icon-name="utility:flow"
                                                size="x-small"
                                                class="slds-var-m-right_x-small"
                                            ></lightning-icon>
                                            This template receives its data from a Flow at runtime via
                                            <code>DocGenFlowAction.jsonData</code>. Merge tags resolve against the JSON
                                            payload your Flow builds before invoking Generate Document — no SOQL or Apex
                                            Data Provider class to configure here.
                                        </p>
                                    </div>
                                </template>

                                <!-- Apex / SOQL config bodies — hidden entirely for JSON Flow templates -->
                                <template if:false={isEditFlowDataSource}>
                                    <template if:true={editUseApexProvider}>
                                        <div class="slds-box slds-theme_default" style="border-radius: 8px">
                                            <p

                                            >
                                                This template is bound to an Apex class implementing
                                                <code>portwoodglobal.DocGenDataProvider</code>. The class supplies merge
                                                data at render time — no SOQL config needed.
                                            </p>
                                            <template if:false={isProviderConnected}>

                                                        type="search"

                                                        placeholder="Type at least 2 characters..."

                                                    </lightning-input>
                                                    <template if:true={showProviderPicker}>

                                                                <template if:true={providerOptions.length}>
                                                                    <template for:each={providerOptions} for:item="cls">

                                                                            <div
                                                                                class="slds-media slds-listbox__option slds-listbox__option_plain slds-media_small"
                                                                                data-value={cls}

                                                                            >
                                                                                <span class="slds-truncate"
                                                                                    ><lightning-icon
                                                                                        icon-name="utility:apex"
                                                                                        size="x-small"
                                                                                        class="slds-var-m-right_x-small"
                                                                                    ></lightning-icon
                                                                                    >{cls}</span
                                                                                >
                                                                            </div>
                                                                        </li>
                                                                    </template>
                                                                </template>
                                                                <template if:false={providerOptions.length}>
                                                                    <li class="slds-listbox__item">
                                                                        <div
                                                                            class="slds-media slds-listbox__option slds-listbox__option_plain slds-media_small"
                                                                        >
                                                                            <span class="slds-text-color_weak"
                                                                                >No classes implementing
                                                                                DocGenDataProvider found</span
                                                                            >
                                                                        </div>
                                                                    </li>
                                                                </template>
                                                            </ul>
                                                        </div>
                                                    </template>
                                                </div>
                                                <template if:true={isValidatingProvider}>
                                                    <div
                                                        class="slds-var-m-top_small slds-is-relative"
                                                        style="height: 30px"
                                                    >
                                                        <lightning-spinner
                                                            alternative-text="Validating..."

                                                        ></lightning-spinner>
                                                    </div>
                                                </template>
                                            </template>

                                            <template if:true={isProviderConnected}>
                                                <div
                                                    style="
                                                        display: flex;
                                                        align-items: center;
                                                        justify-content: space-between;
                                                        margin-bottom: 8px;
                                                    "

                                                    <div style="display: flex; align-items: center; gap: 8px">

                                                            icon-name="utility:apex"
                                                            size="x-small"

                                                        <span class="slds-badge slds-badge_lightest"

                                                    Available merge tags from this provider:

                                                                border: 1px solid #d8c4f0;
                                                                color: #7c3aed;
                                                                padding: 2px 8px;
                                                                border-radius: 4px;
                                                                font-size: 0.78rem;
                                                                font-family: monospace;
                                                            "
                                                            >{p.tag}</span
                                                        >
                                                    </template>
                                                </div>
                                            </template>
                                        </div>
                                    </template>

                                    <!-- Visual Builder -->
                                    <template if:true={editUseVisualBuilder}>
                                        <c-doc-gen-tree-builder
                                            selected-object={editTemplateObject}
                                            query-config={editTemplateQuery}
                                            onconfigchange={handleEditConfigChange}

                                        </c-doc-gen-tree-builder>
                                    </template>

                                    <!-- Manual Query Textarea (hidden when visual builder OR Apex Provider is on) -->
                                    <template if:false={editUseVisualBuilder}>
                                        <template if:false={editUseApexProvider}>
                                            <div style="position: relative">
                                                <textarea
                                                    class="slds-textarea edit-query-textarea"
                                                    value={editTemplateQuery}
                                                    oninput={handleEditDirectQueryEdit}
                                                    onkeydown={handleQueryKeyDown}
                                                    placeholder="Paste a SOQL query or type field names — suggestions will appear.&#10;&#10;Examples:&#10;  SELECT Name, Industry, (SELECT FirstName FROM Contacts) FROM Account&#10;  Name, Industry, Phone&#10;  Owner.Name, CreatedBy.Email&#10;  (SELECT FirstName, LastName FROM Contacts)"
                                                    style="
                                                        width: 100%;
                                                        min-height: 240px;
                                                        font-family: 'SF Mono', Monaco, Consolas, monospace;
                                                        font-size: 0.9rem;
                                                        line-height: 1.8;
                                                        padding: 14px;
                                                        border: 1px solid #d8dde6;
                                                        border-radius: 8px;
                                                        resize: vertical;
                                                    "
                                                >
                                                </textarea>
                                                <template if:true={showSuggestions}>
                                                    <div
                                                        class="slds-is-absolute dg-merge-suggestions"

                                                        <template for:each={suggestions} for:item="s">

                                                                key={s.value}

                                                                data-value={s.value}

                                                                    padding: 6px 12px;
                                                                    cursor: pointer;
                                                                    display: flex;
                                                                    align-items: baseline;
                                                                    gap: 8px;
                                                                "
                                                            >
                                                                <span
                                                                    style="
                                                                        font-family: monospace;
                                                                        font-size: 0.85rem;
                                                                        color: #7c3aed;
                                                                        font-weight: 600;
                                                                    "
                                                                    >{s.value}</span
                                                                >
                                                                <span style="font-size: 0.78rem; color: #706e6b"
                                                                    >{s.label}</span
                                                                >
                                                                <template if:true={s.extra}>
                                                                    <span
                                                                        style="
                                                                            font-size: 0.68rem;
                                                                            color: #999;
                                                                            margin-left: auto;
                                                                        "
                                                                        >{s.extra}</span
                                                                    >
                                                                </template>
                                                            </div>
                                                        </template>
                                                    </div>
                                                </template>
                                            </div>
                                        </template>
                                    </template>

                                    <!-- Manual-only: Query warnings, tree preview, quick reference -->
                                    <template if:false={editUseVisualBuilder}>
                                        <template if:false={editUseApexProvider}>
                                            <template if:true={queryWarnings}>
                                                <template for:each={queryWarnings} for:item="warn">

                                                        key={warn}

                                                            margin-top: 8px;
                                                            padding: 8px 12px;

                                                            border-radius: 6px;

                                                            align-items: center;
                                                            gap: 6px;
                                                        "

                                                            size="xx-small"
                                                            variant="warning"
                                                        ></lightning-icon>
                                                        {warn}

                                                                <lightning-icon
                                                                    icon-name="standard:account"
                                                                    size="xx-small"

                                                            <template if:true={node.hasFields}>
                                                                <div
                                                                    style="
                                                                        margin-left: 22px;
                                                                        display: flex;
                                                                        flex-wrap: wrap;
                                                                        gap: 4px;
                                                                        margin-bottom: 6px;
                                                                    "
                                                                >
                                                                    <template for:each={node.fieldPills} for:item="fp">
                                                                        <span
                                                                            key={fp.key}
                                                                            style="
                                                                                background: #eef4ff;
                                                                                border: 1px solid #c7d7f5;
                                                                                padding: 2px 8px;
                                                                                border-radius: 4px;
                                                                                font-size: 0.75rem;
                                                                                font-family: monospace;
                                                                                display: inline-flex;
                                                                                align-items: baseline;
                                                                                gap: 4px;
                                                                            "

                                                                            <span style="color: #1a56db"
                                                                                >{fp.name}</span
                                                                            >
                                                                        </span>
                                                                    </template>
                                                                </div>
                                                            </template>
                                                            <template if:true={node.hasParentFields}>
                                                                <div
                                                                    style="
                                                                        margin-left: 22px;
                                                                        display: flex;
                                                                        flex-wrap: wrap;
                                                                        gap: 4px;
                                                                        margin-bottom: 6px;
                                                                    "
                                                                >
                                                                    <template for:each={node.parentPills} for:item="pp">
                                                                        <span
                                                                            key={pp.key}
                                                                            style="
                                                                                background: #f3e8ff;
                                                                                border: 1px solid #d8c4f0;

                                                                                border-radius: 4px;
                                                                                font-size: 0.75rem;
                                                                                font-family: monospace;
                                                                            "
                                                                        >
                                                                            <span style="color: #7c3aed"
                                                                                >{pp.name}</span
                                                                            >
                                                                        </span>
                                                                    </template>
                                                                </div>
                                                            </template>
                                                            <template if:true={node.hasFlatChildren}>
                                                                <div style="margin-left: 22px">
                                                                    <template
                                                                        for:each={node.flatChildren}

                                                                                        font-size: 0.82rem;
                                                                                    "

                                                                                        color: #706e6b;
                                                                                        margin-left: 4px;
                                                                                    "

                                                                                >
                                                                            </div>
                                                                            <div
                                                                                style="
                                                                                    margin-left: 20px;
                                                                                    display: flex;
                                                                                    flex-wrap: wrap;
                                                                                    gap: 3px;
                                                                                "
                                                                            >
                                                                                <template
                                                                                    for:each={child.fields}
                                                                                    for:item="cf"
                                                                                >
                                                                                    <span
                                                                                        key={cf}
                                                                                        style="
                                                                                            background: #ecfdf5;
                                                                                            color: #065f46;
                                                                                            padding: 2px 8px;
                                                                                            border-radius: 4px;
                                                                                            font-size: 0.75rem;
                                                                                            font-family: monospace;
                                                                                        "
                                                                                        >{cf}</span
                                                                                    >
                                                                                </template>
                                                                                <template
                                                                                    if:true={child.hasParentFields}
                                                                                >
                                                                                    <template
                                                                                        for:each={child.parentFields}

                                                                                    >
                                                                                        <span
                                                                                            key={pf}
                                                                                            style="
                                                                                                background: #f3e8ff;
                                                                                                color: #7c3aed;
                                                                                                border: 1px solid
                                                                                                    #d8c4f0;
                                                                                                padding: 2px 8px;
                                                                                                border-radius: 4px;
                                                                                                font-size: 0.75rem;
                                                                                                font-family: monospace;
                                                                                            "
                                                                                            >{pf}</span
                                                                                        >
                                                                                    </template>
                                                                                </template>
                                                                            </div>
                                                                        </div>
                                                                    </template>
                                                                </div>
                                                            </template>
                                                        </div>
                                                    </template>
                                                </div>
                                            </template>

                                            <div
                                                style="
                                                    margin-top: 14px;
                                                    background: #f8fafc;
                                                    border: 1px solid #e5e5e5;
                                                    border-radius: 8px;
                                                    padding: 12px 16px;
                                                    font-size: 0.8rem;
                                                    color: #444;
                                                    line-height: 1.7;
                                                "
                                            >
                                                <div style="font-weight: 700; color: #181818; margin-bottom: 6px">
                                                    Quick Reference

                                                        <strong>Fields:</strong>

                                                                background: #eee;

                                                    <div>
                                                        <strong>Parent lookup:</strong>
                                                        <code
                                                            style="
                                                                background: #eee;
                                                                padding: 1px 4px;
                                                                border-radius: 3px;
                                                            "
                                                            >Owner.Name, Account.Industry</code

                                                    <div>
                                                        <strong>Related list:</strong>
                                                        <code
                                                            style="
                                                                background: #eee;

                                                </div>

                                    </template>
