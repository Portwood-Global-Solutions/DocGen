                                        <label class="slds-form-element__label" style="font-weight: 600">Header</label>
                                        <lightning-button
                                            label={headerSourceToggleLabel}
                                            icon-name="utility:anywhere_chat"
                                            variant="base"
                                            onclick={toggleHeaderHtmlSource}
                                        >
                                        </lightning-button>
                                    </div>
                                    <template if:false={showHeaderHtmlSource}>
                                        <lightning-input-rich-text
                                            value={editTemplateHeaderHtml}
                                            onchange={handleEditHeaderHtmlChange}
                                            placeholder="e.g. &#123;Name&#125; — Page &#123;PageNumber&#125; of &#123;TotalPages&#125;"
                                            label-visible="false"
                                        >
                                        </lightning-input-rich-text>
                                    </template>
                                    <template if:true={showHeaderHtmlSource}>
                                        <lightning-textarea
                                            label="Header HTML source"
                                            variant="label-hidden"
                                            value={editTemplateHeaderHtml}
                                            onchange={handleEditHeaderHtmlChange}
                                            placeholder='<div style="text-align:right;"><img src="..." width="40"/> Page &#123;PageNumber&#125;</div>'
                                            class="docgen-html-source"
                                        >
                                        </lightning-textarea>
                                    </template>
                                    <div
                                        class="slds-var-m-top_large"
                                        style="display: flex; align-items: center; justify-content: space-between"
                                    >
                                        <label class="slds-form-element__label" style="font-weight: 600">Footer</label>
                                        <lightning-button
                                            label={footerSourceToggleLabel}
                                            icon-name="utility:anywhere_chat"
                                            variant="base"
                                            onclick={toggleFooterHtmlSource}
                                        >
                                        </lightning-button>
                                    </div>
                                    <template if:false={showFooterHtmlSource}>
                                        <lightning-input-rich-text
                                            value={editTemplateFooterHtml}
                                            onchange={handleEditFooterHtmlChange}
                                            placeholder="e.g. Confidential — Page &#123;PageNumber&#125; of &#123;TotalPages&#125;"
                                            label-visible="false"
                                        >
                                        </lightning-input-rich-text>
                                    </template>
                                    <template if:true={showFooterHtmlSource}>
                                        <lightning-textarea
                                            label="Footer HTML source"
                                            variant="label-hidden"
                                            value={editTemplateFooterHtml}
                                            onchange={handleEditFooterHtmlChange}
                                            placeholder='<div style="text-align:center;font-size:9pt;">Confidential — Page &#123;PageNumber&#125; of &#123;TotalPages&#125;</div>'
                                            class="docgen-html-source"
                                        >
                                        </lightning-textarea>
                                    </template>
                                </div>
                            </lightning-tab>
                        </template>

                        <template if:true={editTemplateOutputIsPdf}>
                            <lightning-tab label="Watermark / Background" value="watermark">
                                <div class="slds-var-p-around_small">
                                    <div
                                        class="slds-box slds-theme_shade slds-var-m-bottom_medium"
                                        style="font-size: 0.85rem"
                                    >
                                        Upload a full-page background image that renders behind your content in PDF
                                        output. For best results, resize the image file to your page dimensions in
                                        pixels at <strong>96 DPI</strong>
                                        (the resolution Flying Saucer uses to render PDFs):
                                        <ul class="slds-list_dotted slds-var-m-top_x-small">
                                            <li><strong>Letter (8.5 × 11 in):</strong> 816 × 1056 px</li>
                                            <li><strong>A4 (8.27 × 11.69 in):</strong> 794 × 1123 px</li>
                                            <li><strong>Legal (8.5 × 14 in):</strong> 816 × 1344 px</li>
                                        </ul>
                                        The image renders edge-to-edge across the entire page (past margins). For a
                                        faded look, pre-fade the image (~15-20% opacity over white) before uploading.
                                    </div>

                                    <template if:true={watermarkPreviewUrl}>
                                        <div style="display: flex; align-items: flex-start; gap: 1rem">
                                            <img
                                                src={watermarkPreviewUrl}
                                                alt="Current watermark"
                                                style="
                                                    max-width: 200px;
                                                    max-height: 260px;
                                                    border: 1px solid #d8dde6;
                                                    padding: 4px;
                                                    background: #fff;
                                                "
                                            />
                                            <div>
                                                <p class="slds-text-body_small slds-var-m-bottom_x-small">
                                                    Active watermark for this template version.
                                                </p>
                                                <lightning-button
                                                    label="Remove watermark"
                                                    icon-name="utility:delete"
                                                    variant="destructive-text"
                                                    onclick={handleClearWatermark}
                                                    disabled={isUploadingWatermark}
                                                >
                                                </lightning-button>
                                            </div>
                                        </div>
                                    </template>

                                    <div class="slds-var-m-top_medium">
                                        <input
                                            type="file"
                                            data-id="watermarkFileInput"
                                            accept="image/*"
                                            onchange={handleWatermarkFileSelected}
                                            disabled={isUploadingWatermark}
                                        />
                                        <template if:true={isUploadingWatermark}>
                                            <p class="slds-text-body_small slds-var-m-top_x-small">Uploading…</p>
                                        </template>
                                    </div>
                                </div>
                            </lightning-tab>
                        </template>

                        <!-- Tab 2: Query Configuration -->
                        <lightning-tab label="Query Configuration" value="query" onactive={handleQueryTabActive}>
                            <div class="slds-var-p-horizontal_small" style="padding-top: 8px">
                                <div
                                    style="
                                        margin-bottom: 12px;
                                        display: flex;
                                        align-items: center;
                                        justify-content: space-between;
                                    "
                                >
                                    <div style="display: flex; align-items: center; gap: 8px">
                                        <lightning-icon icon-name="standard:account" size="x-small"></lightning-icon>
                                        <span style="font-weight: 700">{editBaseObjectDisplay}</span>
                                    </div>
                                    <template if:false={isEditFlowDataSource}>
                                        <div style="display: flex; align-items: center; gap: 16px">
                                            <template if:false={editUseApexProvider}>
                                                <a
                                                    href="javascript:void(0)"
                                                    onclick={toggleEditVisualBuilder}
                                                    style="
                                                        font-size: 0.82rem;
                                                        color: #7c3aed;
                                                        text-decoration: none;
                                                        display: flex;
                                                        align-items: center;
                                                        gap: 4px;
                                                    "
                                                >
                                                    <lightning-icon
                                                        icon-name={editVisualBuilderToggleIcon}
                                                        size="xx-small"
                                                        style="--sds-c-icon-color-foreground-default: #7c3aed"
                                                    ></lightning-icon>
                                                    <template if:false={editUseVisualBuilder}
                                                        >Try our visual builder</template
                                                    >
                                                    <template if:true={editUseVisualBuilder}
                                                        >Switch to manual query</template
                                                    >
                                                </a>
                                            </template>
                                            <a
                                                href="javascript:void(0)"
                                                onclick={toggleEditApexProvider}
                                                style="
                                                    font-size: 0.82rem;
                                                    color: #7c3aed;
                                                    text-decoration: none;
                                                    display: flex;
                                                    align-items: center;
                                                    gap: 4px;
                                                "
                                            >
                                                <lightning-icon
                                                    icon-name="utility:apex"
                                                    size="xx-small"
                                                    style="--sds-c-icon-color-foreground-default: #7c3aed"
                                                ></lightning-icon>
                                                {editApexProviderToggleLabel}
                                            </a>
                                        </div>
                                    </template>
                                </div>

                                <!-- JSON Data (from Flow) mode: no SOQL/Apex config -->
                                <template if:true={isEditFlowDataSource}>
                                    <div class="slds-box slds-theme_default" style="border-radius: 8px">
                                        <p class="slds-text-body_small">
                                            <lightning-icon
                                                icon-name="utility:flow"
                                                size="x-small"
                                                class="slds-var-m-right_x-small"
                                            ></lightning-icon>
                                            This template receives its data from a Flow at runtime via
                                            <code>DocGenFlowAction.jsonData</code>. Merge tags resolve against the JSON
                                            payload your Flow builds before invoking Generate Document — no SOQL or Apex
                                            Data Provider class to configure here.
                                        </p>
                                    </div>
                                </template>

                                <!-- Apex / SOQL config bodies — hidden entirely for JSON Flow templates -->
                                <template if:false={isEditFlowDataSource}>
                                    <template if:true={editUseApexProvider}>
                                        <div class="slds-box slds-theme_default" style="border-radius: 8px">
                                            <p
                                                class="slds-text-body_small slds-text-color_weak slds-var-m-bottom_small"
                                            >
                                                This template is bound to an Apex class implementing
                                                <code>portwoodglobal.DocGenDataProvider</code>. The class supplies merge
                                                data at render time — no SOQL config needed.
                                            </p>
                                            <template if:false={isProviderConnected}>
                                                <div style="position: relative">
                                                    <lightning-input
                                                        type="search"
                                                        label="Search for a Data Provider class"
                                                        placeholder="Type at least 2 characters..."
                                                        value={providerSearchTerm}
                                                        onchange={handleApexProviderSearch}
                                                    >
                                                    </lightning-input>
                                                    <template if:true={showProviderPicker}>
                                                        <div
                                                            class="slds-dropdown slds-dropdown_length-5 slds-dropdown_fluid slds-is-absolute dg-provider-dropdown"
                                                        >
                                                            <ul class="slds-listbox slds-listbox_vertical">
                                                                <template if:true={providerOptions.length}>
                                                                    <template for:each={providerOptions} for:item="cls">
                                                                        <li key={cls} class="slds-listbox__item">
                                                                            <div
                                                                                class="slds-media slds-listbox__option slds-listbox__option_plain slds-media_small"
                                                                                data-value={cls}
                                                                                onclick={handleApexProviderSelect}
                                                                            >
                                                                                <span class="slds-truncate"
                                                                                    ><lightning-icon
                                                                                        icon-name="utility:apex"
                                                                                        size="x-small"
                                                                                        class="slds-var-m-right_x-small"
                                                                                    ></lightning-icon
                                                                                    >{cls}</span
                                                                                >
                                                                            </div>
                                                                        </li>
                                                                    </template>
                                                                </template>
                                                                <template if:false={providerOptions.length}>
                                                                    <li class="slds-listbox__item">
                                                                        <div
                                                                            class="slds-media slds-listbox__option slds-listbox__option_plain slds-media_small"
                                                                        >
                                                                            <span class="slds-text-color_weak"
                                                                                >No classes implementing
                                                                                DocGenDataProvider found</span
                                                                            >
                                                                        </div>
                                                                    </li>
                                                                </template>
                                                            </ul>
                                                        </div>
                                                    </template>
                                                </div>
                                                <template if:true={isValidatingProvider}>
                                                    <div
                                                        class="slds-var-m-top_small slds-is-relative"
                                                        style="height: 30px"
                                                    >
                                                        <lightning-spinner
                                                            alternative-text="Validating..."
                                                            size="small"
                                                        ></lightning-spinner>
                                                    </div>
                                                </template>
                                            </template>

                                            <template if:true={isProviderConnected}>
                                                <div
                                                    style="
                                                        display: flex;
                                                        align-items: center;
                                                        justify-content: space-between;
                                                        margin-bottom: 8px;
                                                    "
                                                >
                                                    <div style="display: flex; align-items: center; gap: 8px">
                                                        <lightning-icon
                                                            icon-name="utility:apex"
                                                            size="x-small"
                                                        ></lightning-icon>
                                                        <span style="font-weight: 700"
                                                            >{selectedProviderClassName}</span
                                                        >
                                                        <span class="slds-badge slds-badge_lightest"
                                                            >{providerFields.length} fields</span
                                                        >
                                                    </div>
                                                    <lightning-button
                                                        label="Change class"
                                                        variant="base"
                                                        icon-name="utility:close"
                                                        onclick={handleClearApexProvider}
                                                    >
                                                    </lightning-button>
                                                </div>
                                                <p class="slds-text-body_small slds-text-color_weak">
                                                    Available merge tags from this provider:
                                                </p>
                                                <div style="display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px">
                                                    <template for:each={providerTagPills} for:item="p">
                                                        <span
                                                            key={p.raw}
                                                            style="
                                                                background: #f3e8ff;
                                                                border: 1px solid #d8c4f0;
                                                                color: #7c3aed;
                                                                padding: 2px 8px;
                                                                border-radius: 4px;
                                                                font-size: 0.78rem;
                                                                font-family: monospace;
                                                            "
                                                            >{p.tag}</span
                                                        >
                                                    </template>
                                                </div>
                                            </template>
                                        </div>
                                    </template>

                                    <!-- Visual Builder -->
                                    <template if:true={editUseVisualBuilder}>
                                        <c-doc-gen-tree-builder
                                            selected-object={editTemplateObject}
                                            query-config={editTemplateQuery}
                                            onconfigchange={handleEditConfigChange}
                                        >
                                        </c-doc-gen-tree-builder>
                                    </template>

                                    <!-- Manual Query Textarea (hidden when visual builder OR Apex Provider is on) -->
                                    <template if:false={editUseVisualBuilder}>
                                        <template if:false={editUseApexProvider}>
                                            <div style="position: relative">
                                                <textarea
                                                    class="slds-textarea edit-query-textarea"
                                                    value={editTemplateQuery}
                                                    oninput={handleEditDirectQueryEdit}
                                                    onkeydown={handleQueryKeyDown}
                                                    placeholder="Paste a SOQL query or type field names — suggestions will appear.&#10;&#10;Examples:&#10;  SELECT Name, Industry, (SELECT FirstName FROM Contacts) FROM Account&#10;  Name, Industry, Phone&#10;  Owner.Name, CreatedBy.Email&#10;  (SELECT FirstName, LastName FROM Contacts)"
                                                    style="
                                                        width: 100%;
                                                        min-height: 240px;
                                                        font-family: 'SF Mono', Monaco, Consolas, monospace;
                                                        font-size: 0.9rem;
                                                        line-height: 1.8;
                                                        padding: 14px;
                                                        border: 1px solid #d8dde6;
                                                        border-radius: 8px;
                                                        resize: vertical;
                                                    "
                                                >
                                                </textarea>
                                                <template if:true={showSuggestions}>
                                                    <div
                                                        class="slds-is-absolute dg-merge-suggestions"
                                                        onmousedown={handleSuggestionMouseDown}
                                                    >
                                                        <template for:each={suggestions} for:item="s">
                                                            <div
                                                                key={s.value}
                                                                class="slash-item"
                                                                data-value={s.value}
                                                                onclick={handleSuggestionClick}
                                                                style="
                                                                    padding: 6px 12px;
                                                                    cursor: pointer;
                                                                    display: flex;
                                                                    align-items: baseline;
                                                                    gap: 8px;
                                                                "
                                                            >
                                                                <span
                                                                    style="
                                                                        font-family: monospace;
                                                                        font-size: 0.85rem;
                                                                        color: #7c3aed;
                                                                        font-weight: 600;
                                                                    "
                                                                    >{s.value}</span
                                                                >
                                                                <span style="font-size: 0.78rem; color: #706e6b"
                                                                    >{s.label}</span
                                                                >
                                                                <template if:true={s.extra}>
                                                                    <span
                                                                        style="
                                                                            font-size: 0.68rem;
                                                                            color: #999;
                                                                            margin-left: auto;
                                                                        "
                                                                        >{s.extra}</span
                                                                    >
                                                                </template>
                                                            </div>
                                                        </template>
                                                    </div>
                                                </template>
                                            </div>
                                        </template>
                                    </template>

                                    <!-- Manual-only: Query warnings, tree preview, quick reference -->
                                    <template if:false={editUseVisualBuilder}>
                                        <template if:false={editUseApexProvider}>
                                            <template if:true={queryWarnings}>
                                                <template for:each={queryWarnings} for:item="warn">
                                                    <div
                                                        key={warn}
                                                        style="
                                                            margin-top: 8px;
                                                            padding: 8px 12px;
                                                            background: #fff8e1;
                                                            border: 1px solid #f9a825;
                                                            border-radius: 6px;
                                                            font-size: 0.8rem;
                                                            color: #5d4037;
                                                            display: flex;
                                                            align-items: center;
                                                            gap: 6px;
                                                        "
                                                    >
                                                        <lightning-icon
                                                            icon-name="utility:warning"
                                                            size="xx-small"
                                                            variant="warning"
                                                        ></lightning-icon>
                                                        {warn}
                                                    </div>
                                                </template>
                                            </template>

                                            <template if:true={queryTreeNodes.length}>
                                                <div
                                                    style="
                                                        margin-top: 12px;
                                                        border: 1px solid #e5e5e5;
                                                        border-radius: 8px;
                                                        padding: 10px 14px;
                                                        background: #fafaf9;
                                                    "
                                                >
                                                    <template for:each={queryTreeNodes} for:item="node">
                                                        <div key={node.id}>
                                                            <div
                                                                style="
                                                                    display: flex;
                                                                    align-items: center;
                                                                    gap: 4px;
                                                                    margin-bottom: 6px;
                                                                "
                                                            >
                                                                <lightning-icon
                                                                    icon-name="standard:account"
                                                                    size="xx-small"
                                                                ></lightning-icon>
                                                                <span style="font-weight: 700; font-size: 0.85rem"
                                                                    >{node.label}</span
                                                                >
                                                            </div>
                                                            <template if:true={node.hasFields}>
                                                                <div
                                                                    style="
                                                                        margin-left: 22px;
                                                                        display: flex;
                                                                        flex-wrap: wrap;
                                                                        gap: 4px;
                                                                        margin-bottom: 6px;
                                                                    "
                                                                >
                                                                    <template for:each={node.fieldPills} for:item="fp">
                                                                        <span
                                                                            key={fp.key}
                                                                            style="
                                                                                background: #eef4ff;
                                                                                border: 1px solid #c7d7f5;
                                                                                padding: 2px 8px;
                                                                                border-radius: 4px;
                                                                                font-size: 0.75rem;
                                                                                font-family: monospace;
                                                                                display: inline-flex;
                                                                                align-items: baseline;
                                                                                gap: 4px;
                                                                            "
                                                                        >
                                                                            <span style="color: #1a56db"
                                                                                >{fp.name}</span
                                                                            >
                                                                        </span>
                                                                    </template>
                                                                </div>
                                                            </template>
                                                            <template if:true={node.hasParentFields}>
                                                                <div
                                                                    style="
                                                                        margin-left: 22px;
                                                                        display: flex;
                                                                        flex-wrap: wrap;
                                                                        gap: 4px;
                                                                        margin-bottom: 6px;
                                                                    "
                                                                >
                                                                    <template for:each={node.parentPills} for:item="pp">
                                                                        <span
                                                                            key={pp.key}
                                                                            style="
                                                                                background: #f3e8ff;
                                                                                border: 1px solid #d8c4f0;
                                                                                padding: 2px 8px;
                                                                                border-radius: 4px;
                                                                                font-size: 0.75rem;
                                                                                font-family: monospace;
                                                                            "
                                                                        >
                                                                            <span style="color: #7c3aed"
                                                                                >{pp.name}</span
                                                                            >
                                                                        </span>
                                                                    </template>
                                                                </div>
                                                            </template>
                                                            <template if:true={node.hasFlatChildren}>
                                                                <div style="margin-left: 22px">
                                                                    <template
                                                                        for:each={node.flatChildren}
                                                                        for:item="child"
                                                                    >
                                                                        <div key={child.id} style={child.indentStyle}>
                                                                            <div
                                                                                style="
                                                                                    display: flex;
                                                                                    align-items: center;
                                                                                    gap: 4px;
                                                                                    margin-bottom: 4px;
                                                                                "
                                                                            >
                                                                                <lightning-icon
                                                                                    icon-name="standard:related_list"
                                                                                    size="xx-small"
                                                                                ></lightning-icon>
                                                                                <span
                                                                                    style="
                                                                                        font-weight: 600;
                                                                                        font-size: 0.82rem;
                                                                                    "
                                                                                    >{child.label}</span
                                                                                >
                                                                                <span
                                                                                    style="
                                                                                        font-size: 0.72rem;
                                                                                        color: #706e6b;
                                                                                        margin-left: 4px;
                                                                                    "
                                                                                    >({child.fieldCount} fields)</span
                                                                                >
                                                                            </div>
                                                                            <div
                                                                                style="
                                                                                    margin-left: 20px;
                                                                                    display: flex;
                                                                                    flex-wrap: wrap;
                                                                                    gap: 3px;
                                                                                "
                                                                            >
                                                                                <template
                                                                                    for:each={child.fields}
                                                                                    for:item="cf"
                                                                                >
                                                                                    <span
                                                                                        key={cf}
                                                                                        style="
                                                                                            background: #ecfdf5;
                                                                                            color: #065f46;
                                                                                            padding: 2px 8px;
                                                                                            border-radius: 4px;
                                                                                            font-size: 0.75rem;
                                                                                            font-family: monospace;
                                                                                        "
                                                                                        >{cf}</span
                                                                                    >
                                                                                </template>
                                                                                <template
                                                                                    if:true={child.hasParentFields}
                                                                                >
                                                                                    <template
                                                                                        for:each={child.parentFields}
                                                                                        for:item="pf"
                                                                                    >
                                                                                        <span
                                                                                            key={pf}
                                                                                            style="
                                                                                                background: #f3e8ff;
                                                                                                color: #7c3aed;
                                                                                                border: 1px solid
                                                                                                    #d8c4f0;
                                                                                                padding: 2px 8px;
                                                                                                border-radius: 4px;
                                                                                                font-size: 0.75rem;
                                                                                                font-family: monospace;
                                                                                            "
                                                                                            >{pf}</span
                                                                                        >
                                                                                    </template>
                                                                                </template>
                                                                            </div>
                                                                        </div>
                                                                    </template>
                                                                </div>
                                                            </template>
                                                        </div>
                                                    </template>
                                                </div>
                                            </template>

                                            <div
                                                style="
                                                    margin-top: 14px;
                                                    background: #f8fafc;
                                                    border: 1px solid #e5e5e5;
                                                    border-radius: 8px;
                                                    padding: 12px 16px;
                                                    font-size: 0.8rem;
                                                    color: #444;
                                                    line-height: 1.7;
                                                "
                                            >
                                                <div style="font-weight: 700; color: #181818; margin-bottom: 6px">
                                                    Quick Reference
                                                </div>
                                                <div
                                                    style="display: grid; grid-template-columns: 1fr 1fr; gap: 4px 24px"
                                                >
                                                    <div>
                                                        <strong>Fields:</strong>
                                                        <code
                                                            style="
                                                                background: #eee;
                                                                padding: 1px 4px;
                                                                border-radius: 3px;
                                                            "
                                                            >Name, Industry, Phone</code
                                                        >
                                                    </div>
                                                    <div>
                                                        <strong>Parent lookup:</strong>
                                                        <code
                                                            style="
                                                                background: #eee;
                                                                padding: 1px 4px;
                                                                border-radius: 3px;
                                                            "
                                                            >Owner.Name, Account.Industry</code
                                                        >
                                                    </div>
                                                    <div>
                                                        <strong>Related list:</strong>
                                                        <code
                                                            style="
                                                                background: #eee;
                                                                padding: 1px 4px;
                                                                border-radius: 3px;
                                                            "
                                                            >(SELECT FirstName FROM Contacts)</code
                                                        >
                                                    </div>
                                                    <div>
                                                        <strong>With filter:</strong>
                                                        <code
                                                            style="
                                                                background: #eee;
                                                                padding: 1px 4px;
                                                                border-radius: 3px;
                                                            "
                                                            >(SELECT Name FROM Opps WHERE StageName = 'Closed
                                                            Won')</code
                                                        >
                                                    </div>
                                                    <div>
                                                        <strong>With sort:</strong>
                                                        <code
                                                            style="
                                                                background: #eee;
                                                                padding: 1px 4px;
                                                                border-radius: 3px;
                                                            "
                                                            >(SELECT Name FROM Contacts ORDER BY LastName)</code
                                                        >
                                                    </div>
                                                    <div>
                                                        <strong>With limit:</strong>
                                                        <code
                                                            style="
                                                                background: #eee;
                                                                padding: 1px 4px;
                                                                border-radius: 3px;
                                                            "
                                                            >(SELECT Name FROM Cases LIMIT 10)</code
                                                        >
                                                    </div>
                                                </div>
                                            </div>
                                        </template>
                                    </template>
                                </template>
                            </div>
                        </lightning-tab>

                        <!-- Tab: Signer Inputs (#161) — form fields with optional record writeback -->
                        <lightning-tab label="Signer Inputs" value="signerInputs">
                            <div class="slds-var-p-around_small">
                                <div class="pdf-acroform-mapping">
                                    <div class="pdf-acroform-mapping__header">
                                        <div class="slds-media slds-media_center">
                                            <div class="slds-media__figure">
                                                <lightning-icon icon-name="utility:edit_form" size="small">
                                                </lightning-icon>
                                            </div>
                                            <div class="slds-media__body">
                                                <h3 class="slds-text-heading_small">Signer Form Fields</h3>
                                                <p class="slds-text-body_small slds-text-color_weak">
                                                    Inputs the signer fills in while e-signing. Paste each field's
                                                    <code>&lbrace;?key&rbrace;</code> tag into your template to place
                                                    its value, and optionally write the value back to a record field.
                                                    Writeback applies to single-signer requests only; on multi-signer
                                                    documents the values are captured to the signing certificate (per
                                                    signer) but not written back to the record.
                                                </p>
                                            </div>
                                        </div>
                                        <div class="pdf-acroform-mapping__actions">
                                            <lightning-button
                                                label="Add Field"
                                                icon-name="utility:add"
                                                variant="brand"
                                                onclick={handleAddSignerField}
                                            ></lightning-button>
                                        </div>
                                    </div>
                                    <template if:true={hasSignerFields}>
                                        <div class="pdf-acroform-mapping__scroll">
                                            <table class="pdf-acroform-mapping__table signer-fields__table">
                                                <thead>
                                                    <tr>
                                                        <th scope="col">Label</th>
                                                        <th scope="col">Type</th>
                                                        <th scope="col">Mapped Field</th>
                                                        <th scope="col">Required</th>
                                                        <th scope="col">Write Back</th>
                                                        <th scope="col">On Certificate</th>
                                                        <th scope="col">Merge Tag</th>
                                                        <th scope="col">Order</th>
                                                        <th scope="col"></th>
                                                    </tr>
                                                </thead>
                                                <tbody>
                                                    <template for:each={signerFieldRows} for:item="row">
                                                        <tr key={row.key} class="pdf-acroform-row">
                                                            <td>
                                                                <lightning-input
                                                                    type="text"
                                                                    variant="label-hidden"
                                                                    value={row.label}
                                                                    data-index={row.index}
                                                                    placeholder="Field label"
                                                                    onchange={handleSignerFieldLabelChange}
                                                                ></lightning-input>
                                                                <template if:true={row.isPicklist}>
                                                                    <lightning-input
                                                                        class="slds-var-m-top_xx-small"
                                                                        type="text"
                                                                        variant="label-hidden"
                                                                        value={row.choicesText}
                                                                        data-index={row.index}
                                                                        placeholder="Choices, comma-separated"
                                                                        onchange={handleSignerFieldChoicesChange}
                                                                    ></lightning-input>
                                                                </template>
                                                            </td>
                                                            <td>
                                                                <lightning-combobox
                                                                    variant="label-hidden"
                                                                    value={row.type}
                                                                    data-index={row.index}
                                                                    options={signerFieldTypeOptions}
                                                                    onchange={handleSignerFieldTypeChange}
                                                                ></lightning-combobox>
                                                            </td>
                                                            <td>
                                                                <lightning-combobox
                                                                    variant="label-hidden"
                                                                    value={row.fieldApiName}
                                                                    data-index={row.index}
                                                                    placeholder="Select field"
                                                                    options={row.fieldOptions}
                                                                    onchange={handleSignerFieldMappedChange}
                                                                ></lightning-combobox>
                                                            </td>
                                                            <td>
                                                                <lightning-input
                                                                    type="toggle"
                                                                    variant="label-hidden"
                                                                    checked={row.required}
                                                                    data-index={row.index}
                                                                    message-toggle-active=""
                                                                    message-toggle-inactive=""
                                                                    onchange={handleSignerFieldRequiredChange}
                                                                ></lightning-input>
                                                            </td>
                                                            <td>
                                                                <lightning-input
                                                                    type="toggle"
                                                                    variant="label-hidden"
                                                                    checked={row.writeback}
                                                                    data-index={row.index}
                                                                    message-toggle-active=""
                                                                    message-toggle-inactive=""
                                                                    onchange={handleSignerFieldWritebackChange}
                                                                ></lightning-input>
                                                            </td>
                                                            <td>
                                                                <lightning-input
                                                                    type="toggle"
                                                                    variant="label-hidden"
                                                                    checked={row.listOnCertificate}
                                                                    data-index={row.index}
                                                                    message-toggle-active=""
                                                                    message-toggle-inactive=""
                                                                    onchange={handleSignerFieldCertificateChange}
                                                                ></lightning-input>
                                                            </td>
                                                            <td>
                                                                <code
                                                                    class="tag-click"
                                                                    data-tag={row.mergeTag}
                                                                    onclick={handleCopyEditTag}
                                                                    >{row.mergeTag}</code
                                                                >
                                                            </td>
                                                            <td>
                                                                <lightning-button-icon
                                                                    icon-name="utility:up"
                                                                    alternative-text="Move up"
                                                                    title="Move up"
                                                                    variant="border-filled"
                                                                    data-index={row.index}
                                                                    disabled={row.isFirst}
                                                                    onclick={handleMoveSignerFieldUp}
                                                                ></lightning-button-icon>
                                                                <lightning-button-icon
                                                                    icon-name="utility:down"
                                                                    alternative-text="Move down"
                                                                    title="Move down"
                                                                    variant="border-filled"
                                                                    data-index={row.index}
                                                                    disabled={row.isLast}
                                                                    onclick={handleMoveSignerFieldDown}
                                                                ></lightning-button-icon>
                                                            </td>
                                                            <td>
                                                                <lightning-button-icon
                                                                    icon-name="utility:delete"
                                                                    alternative-text="Remove field"
                                                                    title="Remove field"
                                                                    variant="border-filled"
                                                                    data-index={row.index}
                                                                    onclick={handleRemoveSignerField}
                                                                ></lightning-button-icon>
                                                            </td>
                                                        </tr>
                                                    </template>
                                                </tbody>
                                            </table>
                                        </div>
                                    </template>
                                    <template if:false={hasSignerFields}>
                                        <div class="slds-box slds-theme_shade slds-text-align_center">
                                            <lightning-icon icon-name="utility:edit_form" size="small"></lightning-icon>
                                            <p class="slds-text-body_small slds-text-color_weak slds-var-m-top_x-small">
                                                No signer form fields yet. Add a field to collect input during signing
                                                and place its <code>&lbrace;?key&rbrace;</code> tag in the template.
                                            </p>
                                        </div>
                                    </template>
                                </div>
                            </div>
                        </lightning-tab>

                        <!-- Tab 3: Template Tags -->
                        <lightning-tab label="Copy-Paste Tags" value="tags">
                            <div class="slds-var-p-around_small">
                                <div class="slds-var-m-bottom_medium">
                                    <p class="slds-text-body_small slds-text-color_weak">
                                        Click any tag to copy it. Paste directly into your Word or Excel template.
                                    </p>
                                </div>
                                <div
                                    class="slds-box slds-theme_shade"
                                    style="border-radius: 8px; max-height: 500px; overflow-y: auto"
                                >
                                    <template if:true={editTemplateTags}>
                                        <template for:each={editTemplateTags} for:item="section">
                                            <div key={section.name} class="slds-var-m-bottom_medium">
                                                <h4 class="slds-text-heading_small slds-var-m-bottom_small">
                                                    {section.name}
                                                </h4>
                                                <template if:true={section.isLoop}>
                                                    <div class="slds-var-m-bottom_small">
                                                        <code
                                                            class="tag-click"
                                                            data-tag={section.loopStart}
                                                            onclick={handleCopyEditTag}
                                                            >{section.loopStart}</code
                                                        >
                                                        <span
                                                            class="slds-text-body_small slds-text-color_weak slds-var-m-horizontal_small"
                                                            >...content...</span
                                                        >
                                                        <code
                                                            class="tag-click"
                                                            data-tag={section.loopEnd}
                                                            onclick={handleCopyEditTag}
                                                            >{section.loopEnd}</code
                                                        >
                                                    </div>
                                                </template>
                                                <div style="display: flex; flex-wrap: wrap; gap: 8px">
                                                    <template for:each={section.tags} for:item="tag">
                                                        <code
                                                            key={tag.code}
                                                            class="tag-click"
                                                            data-tag={tag.code}
                                                            onclick={handleCopyEditTag}
                                                            >{tag.code}</code
                                                        >
                                                    </template>
                                                </div>
                                            </div>
                                        </template>
                                    </template>
                                    <template if:false={editTemplateTags}>
                                        <p class="slds-text-body_small slds-text-color_weak">
                                            No tags configured. Edit the query configuration to add fields.
                                        </p>
                                    </template>
                                </div>
                            </div>
                        </lightning-tab>

                        <template if:true={isEditTypePdf}>
                            <lightning-tab label="Fillable Fields" value="pdfFields">
                                <div class="slds-var-p-around_small">
                                    <template if:true={hasUploadedPdfAcroFormFields}>
                                        <div class="pdf-acroform-mapping">
                                            <div class="pdf-acroform-mapping__header">
                                                <div class="slds-media slds-media_center">
                                                    <div class="slds-media__figure">
                                                        <lightning-icon icon-name="utility:form" size="small">
                                                        </lightning-icon>
                                                    </div>
                                                    <div class="slds-media__body">
                                                        <h3 class="slds-text-heading_small">Fillable Field Mapping</h3>
                                                        <p class="slds-text-body_small slds-text-color_weak">
                                                            {pdfAcroFormMappedCount} of {pdfAcroFormFieldCount} mapped
                                                        </p>
                                                        <p class="slds-text-body_small slds-text-color_weak">
                                                            {pdfAcroFormMappingStatusText}
                                                        </p>
                                                    </div>
                                                </div>
                                                <div class="pdf-acroform-mapping__actions">
                                                    <lightning-button-icon
                                                        icon-name="utility:refresh"
                                                        alternative-text="Reload mapping"
                                                        title="Reload mapping"
                                                        variant="border-filled"
                                                        onclick={handleReloadPdfAcroFormMapping}
                                                    ></lightning-button-icon>
                                                    <lightning-button
                                                        label="Save Mapping"
                                                        icon-name="utility:save"
                                                        variant="brand"
                                                        onclick={handleSavePdfAcroFormMapping}
                                                        disabled={isPdfAcroFormSaveMappingDisabled}
                                                    ></lightning-button>
                                                    <lightning-button-icon
                                                        icon-name="utility:close"
                                                        alternative-text="Clear mappings"
                                                        title="Clear mappings"
                                                        variant="border-filled"
                                                        onclick={handleClearPdfAcroFormMappings}
                                                    ></lightning-button-icon>
                                                </div>
                                            </div>
                                            <template if:true={isPreparingPdfAcroFormBody}>
                                                <div class="pdf-acroform-mapping__preparing">
                                                    <lightning-spinner
                                                        alternative-text="Preparing PDF..."
                                                        size="small"
                                                    ></lightning-spinner>
