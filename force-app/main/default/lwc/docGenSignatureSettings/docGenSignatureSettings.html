<template>
    <lightning-card title="Signature Settings" icon-name="standard:signature_request">
        <div slot="actions">
            <lightning-button variant="brand" label={saveLabel} onclick={handleSave} disabled={isSaving}>
            </lightning-button>
        </div>
        <div class="slds-p-horizontal_medium slds-p-bottom_medium">
            <template if:false={isLoaded}>
                <lightning-spinner alternative-text="Loading" size="medium"></lightning-spinner>
            </template>

            <template if:true={isLoaded}>
                <!-- ===== SETUP STATUS CHECKLIST ===== -->
                <div class="slds-section slds-is-open">
                    <h3 class="slds-section__title slds-theme_shade slds-p-around_x-small">
                        <span class="slds-text-title_caps">Setup Status</span>
                    </h3>
                    <div class="slds-section__content slds-p-top_small">
                        <template if:false={setupChecksLoaded}>
                            <lightning-spinner alternative-text="Checking setup" size="small"></lightning-spinner>
                        </template>
                        <template if:true={setupChecksLoaded}>
                            <template if:true={allChecksPassed}>
                                <div
                                    class="slds-box slds-theme_success slds-m-bottom_small"
                                    style="
                                        background: #e6f9e6;
                                        border: 1px solid #2e844a;
                                        border-radius: 6px;
                                        padding: 12px 16px;
                                    "
                                >
                                    <lightning-icon
                                        icon-name="utility:success"
                                        size="x-small"
                                        variant="success"
                                        class="slds-m-right_x-small"
                                    ></lightning-icon>
                                    <strong>Signatures are ready to use.</strong> All setup checks passed.
                                </div>
                            </template>
                            <template if:false={allChecksPassed}>
                                <div
                                    class="slds-box slds-m-bottom_small"
                                    style="
                                        background: #fef3cd;
                                        border: 1px solid #e0a800;
                                        border-radius: 6px;
                                        padding: 12px 16px;
                                    "
                                >
                                    <lightning-icon
                                        icon-name="utility:warning"
                                        size="x-small"
                                        class="slds-m-right_x-small"
                                    ></lightning-icon>
                                    <strong>Setup incomplete.</strong> Resolve the items below to enable signatures.
                                </div>
                            </template>
                            <ul class="slds-list_dotted" style="list-style: none; padding: 0; margin: 0">
                                <template for:each={setupChecks} for:item="check">
                                    <li
                                        key={check.name}
                                        class="slds-p-vertical_xx-small"
                                        style="display: flex; align-items: flex-start; gap: 8px"
                                    >
                                        <template if:true={check.passed}>
                                            <lightning-icon
                                                icon-name="utility:success"
                                                size="xx-small"
                                                variant="success"
                                                style="flex-shrink: 0; margin-top: 2px"
                                            ></lightning-icon>
                                        </template>
                                        <template if:false={check.passed}>
                                            <lightning-icon
                                                icon-name="utility:error"
                                                size="xx-small"
                                                variant="error"
                                                style="flex-shrink: 0; margin-top: 2px"
                                            ></lightning-icon>
                                        </template>
                                        <div style="flex: 1">
                                            <strong>{check.name}</strong>
                                            <span class="slds-text-body_small slds-text-color_weak">
                                                &mdash; {check.message}</span
                                            >
                                            <template if:true={check.fixUrl}>
                                                <a
                                                    href={check.fixUrl}
                                                    target="_blank"
                                                    class="slds-m-left_xx-small"
                                                    style="font-size: 12px"
                                                    >Go to Setup</a
                                                >
                                            </template>
                                        </div>
                                    </li>
                                </template>
                            </ul>
                            <div class="slds-m-top_small">
                                <lightning-button
                                    label="Re-check Setup"
                                    variant="neutral"
                                    icon-name="utility:refresh"
                                    onclick={handleRefreshChecks}
                                ></lightning-button>
                                <a
                                    href="https://portwood.dev/guide#e-signatures"
                                    target="_blank"
                                    rel="noopener noreferrer"
                                    class="slds-m-left_small"
                                    style="font-size: 13px; font-weight: 600; color: #047857; text-decoration: none"
                                    >Read the setup steps ↗</a
                                >
                            </div>
                        </template>
                    </div>
                </div>

                <!-- ===== PUBLIC SITE CONFIGURATION ===== -->
                <div class="slds-section slds-is-open slds-m-top_medium">
                    <h3 class="slds-section__title slds-theme_shade slds-p-around_x-small">
                        <span class="slds-text-title_caps">Public Site Configuration</span>
                    </h3>
                    <div class="slds-section__content slds-p-top_small">
                        <lightning-input
                            label="Signature Site URL"
                            value={siteUrl}
                            placeholder="https://yourorg.my.salesforce-sites.com/DocGenSignatures"
                            onchange={handleSiteUrlChange}
                            field-level-help="The public Salesforce Site URL where signers access the signing page. Copy from Setup > Sites > your site's URL."
                        >
                        </lightning-input>
                        <lightning-combobox
                            label="Send Emails From"
                            value={owaId}
                            options={owaOptions}
                            onchange={handleOwaChange}
                            field-level-help="Required: Select an Org-Wide Email Address for PIN verification emails. Guest users cannot send email without one. Create in Setup > Organization-Wide Email Addresses."
                            class="slds-m-top_small"
                        >
                        </lightning-combobox>
                    </div>
                </div>

                <!-- Email branding moved to DocGen Command Hub → Email Templates (per-template
                     subject/body/branding + live preview). Org-wide fallback values are
                     preserved on save below but no longer edited here. -->

                <!-- ===== REMINDERS ===== -->
                <div class="slds-section slds-is-open slds-m-top_medium">
                    <h3 class="slds-section__title slds-theme_shade slds-p-around_x-small">
                        <span class="slds-text-title_caps">Automated Reminders</span>
                    </h3>
                    <div class="slds-section__content slds-p-top_small">
                        <lightning-input
                            type="toggle"
                            label="Enable Signature Reminders"
                            checked={reminderEnabled}
                            onchange={handleReminderEnabledChange}
                            message-toggle-active="Reminders will be sent automatically"
                            message-toggle-inactive="Reminders are off"
                        >
                        </lightning-input>
                        <template if:true={reminderEnabled}>
                            <lightning-input
                                type="number"
                                label="Send reminder after (hours)"
                                value={reminderHours}
                                min="1"
                                max="168"
                                onchange={handleReminderHoursChange}
                                field-level-help="Signers who haven't responded within this many hours will receive a reminder email. Each signer gets at most one reminder."
                                class="slds-m-top_small"
                            >
                            </lightning-input>
                        </template>
                    </div>
                </div>

                <!-- ===== SIGNER VERIFICATION (#verification) ===== -->
                <div class="slds-section slds-is-open slds-m-top_medium">
                    <h3 class="slds-section__title slds-theme_shade slds-p-around_x-small">
                        <span class="slds-text-title_caps">Signer Verification</span>
                    </h3>
                    <div class="slds-section__content slds-p-top_small">
                        <lightning-input
                            type="toggle"
                            label="Require Email Verification"
                            checked={requireVerification}
                            onchange={handleRequireVerificationChange}
                            message-toggle-active="Signers must enter a one-time email code before signing"
                            message-toggle-inactive="Signers can sign without email verification"
                            field-level-help="Org default. Individual templates and sends can override this."
                        >
                        </lightning-input>
                        <template if:true={requireVerification}>
                            <lightning-input
                                type="toggle"
                                label="Pre-fill Signer Email"
                                checked={prefillEmail}
                                onchange={handlePrefillEmailChange}
                                message-toggle-active="Auto-send the code to the signer's known email (skips the email step)"
                                message-toggle-inactive="Signer types their email to receive the code"
                                field-level-help="The code is always sent only to the signer's real inbox; this only removes the typing step."
                                class="slds-m-top_small"
                            >
                            </lightning-input>
                        </template>
                    </div>
                </div>

                <!-- Save feedback -->
                <template if:true={saveMessage}>
                    <div class={saveMessageClass}>{saveMessage}</div>
                </template>
            </template>
        </div>
    </lightning-card>
</template>
